<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IMDb Top 500 — Achievements &amp; Badges Tracker</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #070709;
      --bg-surface: #0f0f13;
      --bg-card: #15151c;
      --border: rgba(255, 255, 255, 0.05);
      --border-hover: rgba(245, 197, 24, 0.25);
      --accent: #f5c518;
      --accent-copper: #e0a96d;
      --text: #f3f4f6;
      --text-dim: #9ca3af;
      --text-dark: #555866;
      --glass: rgba(15, 15, 19, 0.75);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.4;
      overflow-x: hidden;
    }

    /* Header styling */
    header {
      position: sticky;
      top: 0;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 14px 0;
    }

    .header-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .header-left {
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .logo h1 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo span {
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font-body);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .nav-link:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-link.active {
      color: var(--accent);
      background: rgba(245, 197, 24, 0.08);
      font-weight: 600;
    }

    .header-right {
      display: flex;
      align-items: center;
    }

    .quick-stats-pill {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .quick-stats-pill span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    @media (max-width: 600px) {
      .header-wrap {
        flex-direction: column;
        gap: 12px;
      }
      .header-nav {
        gap: 12px;
      }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Ambient background lighting */
    .ambient-header {
      background: radial-gradient(circle at 50% 0%, rgba(224, 169, 109, 0.06) 0%, rgba(7, 7, 9, 0) 70%);
      padding: 40px 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .title-area {
      text-align: center;
      margin-bottom: 30px;
    }

    .title-area h1 {
      font-family: var(--font-display);
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .title-area span {
      background: var(--accent);
      color: #000;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Global Progress Header */
    .progress-bar-container {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(to right, var(--accent-copper), var(--accent));
      width: 0%;
      transition: width 0.5s ease;
    }

    /* Tab controls */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 30px 0;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 12px 10px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab:hover {
      color: #fff;
    }

    .tab.active {
      color: var(--accent);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Grid Layout for Badges */
    .badges-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 50px;
    }

    .badge-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      gap: 15px;
      transition: all 0.3s ease;
      opacity: 0.55;
      filter: grayscale(100%);
    }

    .badge-card.unlocked {
      opacity: 1;
      filter: none;
      border-color: var(--border-hover);
      box-shadow: 0 0 15px rgba(245, 197, 24, 0.05);
    }

    .badge-icon {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .badge-card.unlocked .badge-icon {
      background: rgba(245, 197, 24, 0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .badge-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .badge-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .badge-card.unlocked .badge-title {
      color: #fff;
    }

    .badge-desc {
      font-size: 11px;
      color: var(--text-dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .badge-card.unlocked .badge-desc {
      color: var(--text-dim);
    }

    .badge-progress-track {
      height: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .badge-progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Minimal Movies Explorer */
    .filter-row {
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 15px;
    }

    @media (max-width: 576px) {
      .filter-row {
        grid-template-columns: 1fr;
      }
    }

    .search-box {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px 10px 40px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 14px;
      width: 100%;
      position: relative;
    }

    .search-box-wrap {
      position: relative;
    }

    .search-box-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dark);
    }

    .search-box:focus {
      outline: none;
      border-color: var(--accent);
    }

    .sort-dropdown {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
    }

    .sort-dropdown:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Movie list list format */
    .movies-list-container {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 0;
      margin-bottom: 60px;
    }

    .movie-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      gap: 16px;
    }

    .movie-item:last-child {
      border-bottom: none;
    }

    .movie-item:hover {
      background: rgba(255,255,255,0.01);
    }

    .movie-left {
      display: flex;
      align-items: center;
      gap: 15px;
      flex: 1;
      min-width: 0;
    }

    .movie-rank {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      min-width: 32px;
      text-align: right;
    }

    .movie-item.watched .movie-rank {
      color: var(--accent);
    }

    .movie-details {
      min-width: 0;
    }

    .movie-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .movie-item.watched .movie-title {
      text-decoration: line-through;
      color: var(--text-dim);
    }

    .movie-sub {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .movie-rating {
      color: var(--accent-copper);
      font-weight: 700;
    }

    .movie-right {
      flex-shrink: 0;
    }

    /* Minimal checkbox styling */
    .checkbox-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-dim);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .checkbox-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245, 197, 24, 0.05);
    }

    .movie-item.watched .checkbox-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* Loader */
    .loader-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
      color: var(--text-dim);
      gap: 15px;
    }

    .spinner {
      border: 3px solid rgba(255,255,255,0.05);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-box {
      background: rgba(255, 107, 107, 0.05);
      border: 1px solid rgba(255, 107, 107, 0.15);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: #ff8b8b;
      max-width: 500px;
      margin: 30px auto;
    }

    .manual-picker {
      margin-top: 15px;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <div class="container header-wrap">
      <div class="header-left">
        <a href="index.html" class="logo">
          <h1>Cinematique</h1>
          <span>ARCHIVE</span>
        </a>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-list-check"></i> Watchlist</a>
        <a href="top500.html" class="nav-link active"><i class="fa-solid fa-trophy"></i> Top 500</a>
        <a href="top250.html" class="nav-link"><i class="fa-solid fa-star"></i> Top 250</a>
      </nav>
      <div class="header-right">
        <div class="quick-stats-pill" id="nav-stats-completed">
          <span><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Header -->
  <div class="ambient-header">
    <div class="container">
      <div class="title-area">
        <h1>IMDb Top 500</h1>
        <span>Archival Achievements</span>
      </div>

      <!-- Completion Progress -->
      <div class="progress-bar-container">
        <div class="progress-labels">
          <span>Overall Completion</span>
          <span id="overall-percentage">0 / 500 (0.0%)</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="overall-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs Navigation -->
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('explorer-view')">Explorer &amp; Lists</button>
      <button class="tab" id="badges-tab-btn" onclick="switchTab('badges-view')">Achievements (<span id="unlocked-count">0</span>/9)</button>
    </div>
  </div>

  <!-- View 1: Explorer & List -->
  <div class="container tab-content active" id="explorer-view">
    <div class="filter-row">
      <div class="search-box-wrap">
        <i class="fa-solid fa-magnifying-glass search-box-icon"></i>
        <input type="text" id="search-input" class="search-box" placeholder="Filter movies by title, genre, year, director..." oninput="handleSearch(this.value)" />
      </div>
      <select id="sort-select" class="sort-dropdown" onchange="handleSort(this.value)">
        <option value="rank">IMDb Rank (1-500)</option>
        <option value="rating">Highest Rating</option>
        <option value="year-desc">Release Year (Newest)</option>
        <option value="year-asc">Release Year (Oldest)</option>
      </select>
    </div>

    <!-- Movie List Area -->
    <div id="movie-list-host">
      <div class="loader-overlay" id="loading-spinner">
        <div class="spinner"></div>
        <span>Downloading database from GitHub...</span>
      </div>
    </div>
  </div>

  <!-- View 2: Achievements and Badges -->
  <div class="container tab-content" id="badges-view">
    <div class="badges-grid" id="badges-container">
      <!-- Injected Dynamically -->
    </div>
  </div>

  <script>
    // Storage Key
    const STORAGE_KEY = "imdb_top500_watched";
    
    // Dataset URL (prasertcbs Top 1000 movies from 2006-2016)
    const DATASET_URL = "https://raw.githubusercontent.com/prasertcbs/basic-dataset/master/IMDBtop1000.csv";
    
    // Application States
    let movies = [];
    let activeList = [];
    let watchedSet = new Set();
    let query = "";
    let sortBy = "rank";

    // Badges definitions
    const ACHIEVEMENTS = [
      { id: "apprentice", title: "Cinephile Apprentice", desc: "Watch at least 5 movies from the list.", icon: "fa-medal", type: "count", target: 5 },
      { id: "buff", title: "Dedicated Cinephile", desc: "Watch at least 25 movies from the list.", icon: "fa-award", type: "count", target: 25 },
      { id: "completionist", title: "Grand Completionist", desc: "Watch 100 movies from the list.", icon: "fa-crown", type: "count", target: 100 },
      { id: "action", title: "Action Junkie", desc: "Watch 10 Action movies.", icon: "fa-fire", type: "genre", genre: "Action", target: 10 },
      { id: "scifi", title: "Sci-Fi Fanatic", desc: "Watch 5 Sci-Fi movies.", icon: "fa-user-astronaut", type: "genre", genre: "Sci-Fi", target: 5 },
      { id: "drama", title: "Drama Lover", desc: "Watch 15 Drama movies.", icon: "fa-theater-masks", type: "genre", genre: "Drama", target: 15 },
      { id: "nolan", title: "Nolan Disciple", desc: "Watch 5 movies directed by Christopher Nolan.", icon: "fa-brain", type: "director", director: "Christopher Nolan", target: 5 },
      { id: "classics", title: "Vintage Explorer", desc: "Watch 5 movies released before 2010.", icon: "fa-hourglass-half", type: "year", yearLimit: 2010, target: 5 },
      { id: "blockbusters", title: "Box Office Fan", desc: "Watch 5 blockbusters with > 500,000 votes.", icon: "fa-ticket", type: "votes", votesLimit: 500000, target: 5 }
    ];

    // Load dependencies
    window.addEventListener("DOMContentLoaded", () => {
      loadLocalStorage();
      fetchDatabase();
    });

    function loadLocalStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const list = JSON.parse(stored);
          watchedSet = new Set(list);
        } catch(e) {}
      }
    }

    function saveLocalStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(watchedSet)));
    }

    // Fetch and parse database
    async function fetchDatabase() {
      try {
        const response = await fetch(DATASET_URL);
        if(!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();
        parseCSVData(text);
      } catch (err) {
        console.warn("Failed to fetch database dynamically:", err);
        showErrorBox();
      }
    }

    function showErrorBox() {
      const host = document.getElementById("movie-list-host");
      host.innerHTML = `
        <div class="error-box">
          <i class="fa-solid fa-triangle-exclamation" style="font-size: 32px; margin-bottom: 12px;"></i>
          <p style="font-weight: 600; margin-bottom: 8px;">Database Connection Failed</p>
          <p style="font-size: 13px; opacity: 0.8; margin-bottom: 15px;">We couldn't connect to the database via CORS. You can download the <strong>IMDBtop1000.csv</strong> file from prasertcbs/basic-dataset and select it manually.</p>
          <input type="file" id="manual-file-picker" style="display:none;" accept=".csv" onchange="handleManualFile(event)" />
          <button class="manual-picker" onclick="document.getElementById('manual-file-picker').click()">Load Local IMDBtop1000.csv</button>
        </div>
      `;
    }

    function handleManualFile(e) {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        parseCSVData(evt.target.result);
      };
      reader.readAsText(file);
    }

    // Custom CSV parser that handles commas inside quotes
    function parseCSV(text) {
      const lines = [];
      let row = [""];
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i+1];
        if (c === '"') {
          if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (c === ',' && !inQuotes) {
          row.push('');
        } else if ((c === '\r' || c === '\n') && !inQuotes) {
          if (c === '\r' && next === '\n') { i++; }
          lines.push(row);
          row = [''];
        } else {
          row[row.length - 1] += c;
        }
      }
      if (row.length > 1 || row[0] !== '') lines.push(row);
      return lines;
    }

    function parseCSVData(csvText) {
      const rows = parseCSV(csvText.trim());
      if (rows.length < 2) return;

      const header = rows[0];
      const parsedMovies = [];

      for(let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (r.length < 9) continue;
        
        // Headers: Rank,Title,Genre,Description,Director,Actors,Year,Runtime (Minutes),Rating,Votes,Revenue (Millions),Metascore
        parsedMovies.push({
          rank: parseInt(r[0]),
          title: r[1],
          genre: r[2],
          desc: r[3],
          director: r[4],
          actors: r[5],
          year: parseInt(r[6]),
          runtime: parseInt(r[7]),
          rating: parseFloat(r[8]),
          votes: parseInt(r[9])
        });
      }

      // Sort by original dataset rank
      parsedMovies.sort((a,b) => a.rank - b.rank);

      // Slice the Top 500
      movies = parsedMovies.slice(0, 500);
      
      // Update local ranks in case CSV is unordered
      movies.forEach((m, idx) => m.rank = idx + 1);

      activeList = [...movies];
      
      // Sync with user's personal watchlist from index.html
      syncFromPersonalWatchlist();
      
      updateProgress();
      renderMoviesList();
      renderBadges();
      updateNavStats();
    }

    // Toggle watched state and sync to index.html's database
    function toggleWatched(rank) {
      const movie = movies.find(m => m.rank === rank);
      if (!movie) return;

      if (watchedSet.has(rank)) {
        watchedSet.delete(rank);
        updatePersonalWatchlist(movie, "want");
      } else {
        watchedSet.add(rank);
        updatePersonalWatchlist(movie, "watched");
      }
      saveLocalStorage();
      updateProgress();
      
      // Update UI row class locally instead of full redraw
      const row = document.getElementById(`movie-row-${rank}`);
      if(row) {
        if(watchedSet.has(rank)) row.classList.add("watched");
        else row.classList.remove("watched");
      }

      // Update badges calculations
      calculateBadgesProgress();
      updateNavStats();
    }

    // Sync state from index.html personal watchlist to Top 500 watched list
    function syncFromPersonalWatchlist() {
      const stored = localStorage.getItem("imdb_watchlist_data");
      if (!stored) return;
      try {
        const watchlist = JSON.parse(stored);
        const watchedTitles = new Set(
          watchlist
            .filter(m => m.status === "watched")
            .map(m => m.t.toLowerCase().trim())
        );
        
        let changed = false;
        movies.forEach(m => {
          const titleKey = m.title.toLowerCase().trim();
          const isWatchedInWatchlist = watchedTitles.has(titleKey);
          const isWatchedInTop500 = watchedSet.has(m.rank);
          
          if (isWatchedInWatchlist && !isWatchedInTop500) {
            watchedSet.add(m.rank);
            changed = true;
          } else if (!isWatchedInWatchlist && isWatchedInTop500) {
            watchedSet.delete(m.rank);
            changed = true;
          }
        });
        
        if (changed) {
          saveLocalStorage();
        }
      } catch (e) {
        console.error("Failed to sync from personal watchlist:", e);
      }
    }

    // Add or update status in index.html's database
    function updatePersonalWatchlist(movie, status) {
      const stored = localStorage.getItem("imdb_watchlist_data");
      let watchlist = [];
      if (stored) {
        try { watchlist = JSON.parse(stored); } catch(e) {}
      }
      
      const titleKey = movie.title.toLowerCase().trim();
      const existingIdx = watchlist.findIndex(m => m.t.toLowerCase().trim() === titleKey);
      
      if (existingIdx >= 0) {
        watchlist[existingIdx].status = status;
      } else if (status === "watched") {
        // Add new movie from Top 500 metadata
        watchlist.push({
          t: movie.title,
          g: movie.genre || "Drama",
          y: movie.year || 2010,
          r: movie.rating || 7.0,
          rt: movie.runtime || 120,
          p: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=260&auto=format&fit=crop",
          status: "watched"
        });
      }
      
      localStorage.setItem("imdb_watchlist_data", JSON.stringify(watchlist));
    }

    // Update dynamic navigation stats at the top of the page
    function updateNavStats() {
      const count = watchedSet.size;
      const pct = ((count / 500) * 100).toFixed(0);
      
      // Calculate unlocked badges
      const watchedMovies = movies.filter(m => watchedSet.has(m.rank));
      let unlockedCount = 0;
      ACHIEVEMENTS.forEach(badge => {
        let current = 0;
        if (badge.type === "count") {
          current = watchedMovies.length;
        } else if (badge.type === "genre") {
          current = watchedMovies.filter(m => m.genre && m.genre.includes(badge.genre)).length;
        } else if (badge.type === "director") {
          current = watchedMovies.filter(m => m.director && m.director.toLowerCase() === badge.director.toLowerCase()).length;
        } else if (badge.type === "year") {
          current = watchedMovies.filter(m => m.year < badge.yearLimit).length;
        } else if (badge.type === "votes") {
          current = watchedMovies.filter(m => m.votes > badge.votesLimit).length;
        }
        if (current >= badge.target) {
          unlockedCount++;
        }
      });

      const statsEl = document.getElementById("nav-stats-completed");
      if (statsEl) {
        statsEl.innerHTML = `<span><i class="fa-solid fa-film"></i> <strong>${count}</strong>/500 (${pct}%)</span><span>&nbsp;&bull;&nbsp;</span><span><i class="fa-solid fa-trophy"></i> <strong>${unlockedCount}</strong>/9 Badges</span>`;
      }
    }

    // Storage event listener to keep multiple open tabs synced
    window.addEventListener("storage", (e) => {
      if (e.key === "imdb_watchlist_data" || e.key === STORAGE_KEY) {
        loadLocalStorage();
        if (movies.length > 0) {
          syncFromPersonalWatchlist();
          updateProgress();
          filterAndSort();
          calculateBadgesProgress();
          updateNavStats();
        }
      }
    });

    // Update Global completion bar
    function updateProgress() {
      const count = watchedSet.size;
      const pct = ((count / 500) * 100).toFixed(1);
      
      document.getElementById("overall-percentage").textContent = `${count} / 500 (${pct}%)`;
      document.getElementById("overall-fill").style.width = pct + "%";
    }

    // Tabs toggle
    function switchTab(viewId) {
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

      document.getElementById(viewId).classList.add("active");
      
      // Find matching button
      const targetBtn = Array.from(document.querySelectorAll(".tab")).find(t => {
        const onclickAttr = t.getAttribute("onclick");
        return onclickAttr && onclickAttr.includes(viewId);
      });
      if(targetBtn) targetBtn.classList.add("active");
    }

    // Render Badges
    function renderBadges() {
      const container = document.getElementById("badges-container");
      container.innerHTML = "";
      
      ACHIEVEMENTS.forEach(badge => {
        const card = document.createElement("div");
        card.className = "badge-card";
        card.id = `badge-card-${badge.id}`;
        
        card.innerHTML = `
          <div class="badge-icon">
            <i class="fa-solid ${badge.icon}"></i>
          </div>
          <div class="badge-info">
            <div class="badge-title">${badge.title}</div>
            <div class="badge-desc">${badge.desc}</div>
            <div class="badge-progress-track">
              <div class="badge-progress-fill" id="badge-fill-${badge.id}"></div>
            </div>
          </div>
        `;
        
        container.appendChild(card);
      });

      calculateBadgesProgress();
    }

    function calculateBadgesProgress() {
      let unlockedCount = 0;

      // Extract details of watched movies
      const watchedMovies = movies.filter(m => watchedSet.has(m.rank));

      ACHIEVEMENTS.forEach(badge => {
        let current = 0;
        
        if (badge.type === "count") {
          current = watchedMovies.length;
        } else if (badge.type === "genre") {
          current = watchedMovies.filter(m => m.genre && m.genre.includes(badge.genre)).length;
        } else if (badge.type === "director") {
          current = watchedMovies.filter(m => m.director && m.director.toLowerCase() === badge.director.toLowerCase()).length;
        } else if (badge.type === "year") {
          current = watchedMovies.filter(m => m.year < badge.yearLimit).length;
        } else if (badge.type === "votes") {
          current = watchedMovies.filter(m => m.votes > badge.votesLimit).length;
        }

        const pct = Math.min(100, (current / badge.target) * 100);
        const fillEl = document.getElementById(`badge-fill-${badge.id}`);
        const cardEl = document.getElementById(`badge-card-${badge.id}`);
        
        if (fillEl) fillEl.style.width = pct + "%";
        
        if (current >= badge.target) {
          if (cardEl) cardEl.classList.add("unlocked");
          unlockedCount++;
        } else {
          if (cardEl) cardEl.classList.remove("unlocked");
        }
      });

      // Update badge tab text count
      const textCount = document.getElementById("unlocked-count");
      if(textCount) textCount.textContent = unlockedCount;
    }

    // Render Movies List
    function renderMoviesList() {
      const host = document.getElementById("movie-list-host");
      host.innerHTML = "";

      if(activeList.length === 0) {
        host.innerHTML = `<div style="text-align: center; padding: 50px 0; color: var(--text-dark);">
          <i class="fa-solid fa-magnifying-glass-minus" style="font-size: 24px; margin-bottom: 12px;"></i>
          <p>No films found matching your filter criteria.</p>
        </div>`;
        return;
      }

      const container = document.createElement("div");
      container.className = "movies-list-container";
      
      activeList.forEach(m => {
        const item = document.createElement("div");
        item.className = "movie-item" + (watchedSet.has(m.rank) ? " watched" : "");
        item.id = `movie-row-${m.rank}`;
        
        item.innerHTML = `
          <div class="movie-left">
            <div class="movie-rank">${m.rank}</div>
            <div class="movie-details">
              <div class="movie-title">${m.title}</div>
              <div class="movie-sub">
                <span class="movie-rating"><i class="fa-solid fa-star" style="font-size:10px;"></i> ${m.rating}</span>
                <span>&bull;</span>
                <span>${m.year}</span>
                <span>&bull;</span>
                <span>${m.genre}</span>
                <span>&bull;</span>
                <span>Dir: ${m.director}</span>
              </div>
            </div>
          </div>
          <div class="movie-right">
            <button class="checkbox-btn" onclick="toggleWatched(${m.rank})" title="Toggle Watched"><i class="fa-solid fa-check"></i></button>
          </div>
        `;
        container.appendChild(item);
      });

      host.appendChild(container);
    }

    // Filters and Sorting
    function handleSearch(val) {
      query = val.toLowerCase().trim();
      filterAndSort();
    }

    function handleSort(val) {
      sortBy = val;
      filterAndSort();
    }

    function filterAndSort() {
      activeList = movies.filter(m => {
        return !query || 
          m.title.toLowerCase().includes(query) ||
          m.genre.toLowerCase().includes(query) ||
          m.director.toLowerCase().includes(query) ||
          m.actors.toLowerCase().includes(query) ||
          m.year.toString().includes(query);
      });

      if (sortBy === 'rank') {
        activeList.sort((a,b) => a.rank - b.rank);
      } else if (sortBy === 'rating') {
        activeList.sort((a,b) => b.rating - a.rating || a.rank - b.rank);
      } else if (sortBy === 'year-desc') {
        activeList.sort((a,b) => b.year - a.year || a.rank - b.rank);
      } else if (sortBy === 'year-asc') {
        activeList.sort((a,b) => a.year - b.year || a.rank - b.rank);
      }

      renderMoviesList();
    }
  </script>
</body>
