<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IMDb Top 250 — Achievements &amp; Poster Tracker</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="An interactive grid-based completion tracker for the IMDb Top 250 all-time movies with achievements, dynamic statistics, and synchronization." />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0a;
      --bg-surface: #121212;
      --bg-card: #181818;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.3);
      --accent: #ffffff;
      --accent-copper: #888888;
      --text: #ffffff;
      --text-dim: #a0a0a0;
      --text-dark: #555555;
      --glass: rgba(10, 10, 10, 0.8);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.4;
      overflow-x: hidden;
      padding-bottom: 80px; /* Space for bottom nav on mobile */
    }



    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Ambient background lighting */
    .ambient-header {
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
      padding: 30px 0;
      border-bottom: 1px solid var(--border);
    }

    /* Global Progress Header */
    .progress-bar-container {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(to right, var(--accent-copper), var(--accent));
      width: 0%;
      transition: width 0.5s ease;
    }



    /* List Layout for movies */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 10px 0 50px;
      max-width: 800px;
      margin: 0 auto;
    }

    .movie-row {
      display: flex;
      align-items: center;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      user-select: none;
    }

    .movie-row:hover {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.02);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.02);
    }

    .movie-rank {
      font-family: var(--font-body);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-copper);
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }

    .movie-poster-container {
      width: 48px;
      height: 72px;
      border-radius: 4px;
      overflow: hidden;
      background: #16161f;
      position: relative;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .movie-poster-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    .movie-poster-container img.loaded {
      opacity: 1;
    }

    .placeholder-poster {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dark);
      font-size: 18px;
      background: linear-gradient(135deg, #16161f 0%, #0e0e12 100%);
    }

    .movie-details {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .movie-title-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .movie-title {
      font-weight: 600;
      font-size: 15px;
      color: #fff;
    }

    .movie-year {
      font-size: 12px;
      color: var(--text-dim);
    }

    .movie-meta {
      font-size: 12px;
      color: var(--text-dark);
    }

    .movie-status {
      font-size: 18px;
      color: var(--text-dark);
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    /* Watched State in List Layout */
    .movie-row.watched {
      background: rgba(255, 255, 255, 0.01);
      border-color: rgba(255, 255, 255, 0.04);
    }

    .movie-row.watched .movie-rank,
    .movie-row.watched .movie-title,
    .movie-row.watched .movie-year,
    .movie-row.watched .movie-meta {
      color: var(--text-dark) !important;
    }

    .movie-row.watched .movie-poster-container img {
      filter: grayscale(100%) contrast(0.8);
      opacity: 0.15 !important;
    }

    .movie-row.watched .movie-status {
      color: var(--accent);
    }

    /* Achievements Grid */
    .badges-view {
      display: none;
      padding: 20px 0 50px;
    }

    .badges-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .badge-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      gap: 15px;
      transition: all 0.3s ease;
      opacity: 0.55;
      filter: grayscale(100%);
    }

    .badge-card.unlocked {
      opacity: 1;
      filter: none;
      border-color: var(--border-hover);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.02);
    }

    .badge-icon {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .badge-card.unlocked .badge-icon {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent);
      color: var(--accent);
    }

    .badge-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .badge-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .badge-card.unlocked .badge-title {
      color: #fff;
    }

    .badge-desc {
      font-size: 11px;
      color: var(--text-dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .badge-card.unlocked .badge-desc {
      color: var(--text-dim);
    }

    .badge-progress-track {
      height: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .badge-progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Loader */
    .loader-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      color: var(--text-dim);
      gap: 15px;
    }

    .spinner {
      border: 3px solid rgba(255,255,255,0.05);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Wheel Spin Tab styling */
    .wheel-view {
      display: none;
      padding: 20px 0 50px;
    }

    .wheel-container-card {
      max-width: 600px;
      margin: 0 auto;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .wheel-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 4px solid var(--border);
      background: #121212;
    }

    .wheel-pointer {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      color: #fff;
      z-index: 10;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
    }

    #wheel-canvas {
      display: block;
      border-radius: 50%;
    }

    .wheel-center-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #fff;
      color: #000;
      border: 4px solid #121212;
      font-family: var(--font-body);
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    .wheel-center-btn:hover:not(:disabled) {
      transform: translate(-50%, -50%) scale(1.08);
      background: #e0e0e0;
    }

    .wheel-center-btn:disabled {
      background: #444;
      color: #777;
      cursor: not-allowed;
    }

    .wheel-result-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    .wheel-result-movie {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .wheel-result-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .wheel-result-meta {
      font-size: 13px;
      color: var(--text-dim);
    }

    .wheel-result-actions {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .wheel-btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
    }

    .wheel-btn.primary {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .wheel-btn.primary:hover {
      background: #e0e0e0;
      border-color: #e0e0e0;
    }

    .wheel-btn.secondary {
      background: transparent;
      color: #fff;
    }

    .wheel-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Bottom sticky navigation for mobile views */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: rgba(14, 14, 18, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      z-index: 99;
    }

    .nav-btn {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .nav-btn i {
      font-size: 16px;
    }

    .nav-btn.active {
      color: var(--accent);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(14, 14, 18, 0.9);
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .toast.show {
      opacity: 1;
    }

    /* Minimal movie rank number badge */
    .rank-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      z-index: 5;
      font-family: var(--font-body);
      pointer-events: none;
    }
  </style>
</head>
<body>



  <!-- Ambient Header -->
  <div class="ambient-header">
    <div class="container">


      <!-- Completion Progress -->
      <div class="progress-bar-container">
        <div class="progress-labels" style="justify-content: center;">
          <span id="overall-percentage">0 / 250 (0.0%)</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="overall-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <main class="container">
    <!-- Grid View Tab Content -->
    <div id="home-view">


      <div class="grid" id="grid">
        <div class="loader-overlay" id="loading-spinner">
          <div class="spinner"></div>
          <span>Loading movies database...</span>
        </div>
      </div>
    </div>

    <!-- Achievements Tab Content -->
    <div id="badges-view" class="badges-view">
      <div class="badges-grid" id="badge-list">
        <!-- Injected Dynamically -->
      </div>
    </div>

    <!-- Wheel Spin Tab Content -->
    <div id="wheel-view" class="wheel-view">
      <div class="wheel-container-card">
        <div class="wheel-wrapper">
          <div class="wheel-pointer"><i class="fa-solid fa-caret-down"></i></div>
          <canvas id="wheel-canvas" width="320" height="320"></canvas>
          <button id="wheel-spin-btn" class="wheel-center-btn">SPIN</button>
        </div>
        <div class="wheel-result-card" id="wheel-result" style="display: none;"></div>
      </div>
    </div>
  </main>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <div class="nav-btn active" id="btn-home">
      <i class="fa-solid fa-grip"></i>
      <span>Home</span>
    </div>
    <div class="nav-btn" id="btn-wheel">
      <i class="fa-solid fa-arrows-spin"></i>
      <span>Spin</span>
    </div>
    <div class="nav-btn" id="btn-badges">
      <i class="fa-solid fa-award"></i>
      <span>Badges (<span id="unlocked-count">0</span>/10)</span>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    // Storage Keys
    const WATCHED_KEY = "imdb_tracker_list_v2";

    // Hardcoded TMDB API Key from user configuration
    const API_KEY = "4f09deb9e0cba637e35e8490ba35dd3f";

    // Load Custom Cached Posters from LocalStorage
    let apiPosters = {};
    try {
      const saved = localStorage.getItem('imdb_api_posters_v2');
      if (saved) apiPosters = JSON.parse(saved);
    } catch(e) {}

    // Application States
    let movies = [];
    let activeList = [];
    let watchedSet = new Set();

    // Badges definitions
    const ACHIEVEMENTS = [
      { id: "b1", title: "Cinephile Novice", desc: "Watch at least 5 movies from the list.", icon: "fa-medal", type: "count", target: 5 },
      { id: "b2", title: "Cinema Buff", desc: "Watch at least 25 movies from the list.", icon: "fa-award", type: "count", target: 25 },
      { id: "b3", title: "Cinephile Elite", desc: "Watch at least 100 movies from the list.", icon: "fa-crown", type: "count", target: 100 },
      { id: "b4", title: "IMDb Master", desc: "Watch all 250 movies from the list.", icon: "fa-trophy", type: "count", target: 250 },
      { id: "nolan", title: "Nolan Disciple", desc: "Watch 5 Christopher Nolan films.", icon: "fa-brain", type: "director", director: "Christopher Nolan", target: 5 },
      { id: "godfather", title: "The Family", desc: "Watch both The Godfather and The Godfather Part II.", icon: "fa-handshake", type: "special_godfather", target: 2 },
      { id: "classics", title: "Vintage Explorer", desc: "Watch 10 movies released before 1970.", icon: "fa-hourglass-half", type: "year", yearLimit: 1970, target: 10 },
      { id: "modern", title: "Modern Masterpieces", desc: "Watch 15 movies released in 2010 or later.", icon: "fa-bolt", type: "year_modern", yearLimit: 2010, target: 15 },
      { id: "scifi", title: "Sci-Fi Explorer", desc: "Watch 8 Sci-Fi movies.", icon: "fa-user-astronaut", type: "genre", genre: "Sci-Fi", target: 8 },
      { id: "crime", title: "Crime Syndicate", desc: "Watch 8 Crime movies.", icon: "fa-user-secret", type: "genre", genre: "Crime", target: 8 }
    ];

    // DOM cache
    let grid, badgeList, barEl, viewHome, viewBadges, viewWheel, btnHome, btnBadges, btnWheel;
    let wheelCanvas, wheelSpinBtn, wheelResultEl;
    let wheelRotation = 0;
    let selectedWheelMovies = [];
    let isWheelSpinning = false;

    // Initialize application on DOM load
    window.addEventListener("DOMContentLoaded", () => {
      grid = document.getElementById("grid");
      badgeList = document.getElementById("badge-list");
      barEl = document.getElementById("overall-fill");
      viewHome = document.getElementById("home-view");
      viewBadges = document.getElementById("badges-view");
      viewWheel = document.getElementById("wheel-view");
      btnHome = document.getElementById("btn-home");
      btnBadges = document.getElementById("btn-badges");
      btnWheel = document.getElementById("btn-wheel");
      
      wheelCanvas = document.getElementById("wheel-canvas");
      wheelSpinBtn = document.getElementById("wheel-spin-btn");
      wheelResultEl = document.getElementById("wheel-result");

      init();
    });

    let cardObserver;
    const queue = [];
    let isFetching = false;

    function init() {
      loadLocalStorage();
      setupCardObserver();
      loadDatabase();
      setupListeners();
    }

    function loadLocalStorage() {
      const stored = localStorage.getItem(WATCHED_KEY);
      if (stored) {
        try {
          const list = JSON.parse(stored);
          watchedSet = new Set(list);
        } catch(e) {}
      }

      // Clear "failed" entries to re-fetch with improved fallback algorithm
      let changed = false;
      for (const title in apiPosters) {
        if (apiPosters[title] === "failed") {
          delete apiPosters[title];
          changed = true;
        }
      }
      if (changed) {
        localStorage.setItem('imdb_api_posters_v2', JSON.stringify(apiPosters));
      }
    }

    function saveLocalStorage() {
      localStorage.setItem(WATCHED_KEY, JSON.stringify(Array.from(watchedSet)));
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove("show"), 2500);
    }

    // Load static local database
    async function loadDatabase() {
      try {
        const response = await fetch('./movies-250.json');
        if (!response.ok) throw new Error("Failed to load local JSON file");
        const data = await response.json();
        
        movies = data;
        // Assign rank numbers and ID strings based on rating sort
        movies.forEach((m, idx) => {
          m.rank = idx + 1;
          m.id = `m${idx + 1}`;
          m.title = m.name; // map name to title for TMDB loop
          
          // Use cached TMDB poster, or load dynamically in viewport
          const cached = apiPosters[m.title];
          if (cached && cached !== "failed") {
            m.poster = cached;
          } else {
            m.poster = undefined;
          }
        });

        activeList = [...movies];
        
        updateStats();
        renderMovies(activeList);
        
        // Dynamically start fetching missing TMDB poster art in background
        initFetchQueue();
      } catch (err) {
        console.error("Error loading JSON database:", err);
        grid.innerHTML = `
          <div class="loader-overlay" style="color: var(--text-dim); text-align: center;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 32px; margin-bottom: 12px; color: var(--text-dark);"></i>
            <p style="font-weight: 600;">Failed to load movies-250.json</p>
            <p style="font-size: 13px; opacity: 0.8; margin-top: 5px;">Ensure the file is present in your server's root folder.</p>
          </div>
        `;
      }
    }

    // Setup input and click event listeners
    function setupListeners() {
      btnHome.addEventListener("click", () => switchTab('home'));
      btnWheel.addEventListener("click", () => {
        switchTab('wheel');
        initWheel();
      });
      btnBadges.addEventListener("click", () => switchTab('badges'));
    }

    // Determine if movie still needs a TMDB query
    function needsTmdbFetch(movie) {
      return apiPosters[movie.title] === undefined;
    }

    // Setup IntersectionObserver to prioritize viewport fetching
    function setupCardObserver() {
      if (!('IntersectionObserver' in window)) return;
      
      cardObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const card = entry.target;
            const movieId = card.dataset.id;
            const movie = movies.find(m => m.id === movieId);
            if (movie && needsTmdbFetch(movie)) {
              prioritizeMovie(movie);
            }
            cardObserver.unobserve(card);
          }
        });
      }, {
        root: null,
        rootMargin: "100px 0px 100px 0px", // prefetch 100px before coming on screen
        threshold: 0.01
      });
    }

    // Push movie to the front of TMDB fetch queue
    function prioritizeMovie(movie) {
      if (!needsTmdbFetch(movie)) return;
      
      const idx = queue.findIndex(m => m.id === movie.id);
      if (idx > -1) {
        queue.splice(idx, 1);
      }
      queue.unshift(movie);
      processQueue();
    }

    // Background fetch initialization
    function initFetchQueue() {
      movies.forEach(m => {
        if (needsTmdbFetch(m)) {
          queue.push(m);
        }
      });
      processQueue();
    }

    // Serialized fetch worker with rate limit delay
    async function processQueue() {
      if (isFetching) return;
      isFetching = true;
      
      while (queue.length > 0) {
        const movie = queue.shift();
        if (needsTmdbFetch(movie)) {
          await fetchMoviePoster(movie);
          await new Promise(r => setTimeout(r, 250)); // 250ms delay to prevent rate limit
        }
      }
      
      isFetching = false;
    }

    // Fetch poster for a movie from TMDB
    async function fetchMoviePoster(movie) {
      try {
        let url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(movie.title)}&primary_release_year=${movie.year}`;
        let res = await fetch(url);
        if (!res.ok) {
          console.error("TMDB API request failed with status", res.status);
          return; // Skip caching as failed if network error
        }
        let data = await res.json();
        if (data.success === false) {
          console.error("TMDB API returned error:", data.status_message);
          return; // Skip caching as failed if API key or authorization error
        }
        
        // Fallback: search without release year constraint if strict filtering returns no results
        if ((!data.results || data.results.length === 0) && movie.year) {
          url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(movie.title)}`;
          res = await fetch(url);
          if (!res.ok) {
            console.error("TMDB Fallback API request failed with status", res.status);
            return;
          }
          data = await res.json();
          if (data.success === false) {
            console.error("TMDB Fallback API returned error:", data.status_message);
            return;
          }
        }
        
        if (data.results && data.results.length > 0 && data.results[0].poster_path) {
          const posterUrl = `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
          movie.poster = posterUrl;
          apiPosters[movie.title] = posterUrl;
          localStorage.setItem('imdb_api_posters_v2', JSON.stringify(apiPosters));
          
          // Dynamically swap the image inside the card if visible on screen
          const card = document.querySelector(`.movie-row[data-id="${movie.id}"]`);
          if (card) {
            const img = card.querySelector(".movie-poster");
            const placeholder = card.querySelector(".placeholder-poster");
            if (img && placeholder) {
              img.src = posterUrl;
              img.style.display = "block";
              if (img.complete) {
                img.classList.add("loaded");
                placeholder.style.display = "none";
              } else {
                img.addEventListener("load", () => {
                  img.classList.add("loaded");
                  placeholder.style.display = "none";
                });
                img.addEventListener("error", () => {
                  handleImageError(img, movie);
                });
              }
            }
          }
        } else {
          // If TMDB returns no results, store "failed" in cache to skip in future
          apiPosters[movie.title] = "failed";
          localStorage.setItem('imdb_api_posters_v2', JSON.stringify(apiPosters));
        }
      } catch(err) {
        console.error("Fetch error for", movie.title, err);
      }
    }

    // Toggle movie watched status
    function toggleWatched(id, cardElement) {
      const movie = movies.find(m => m.id === id);
      if (!movie) return;

      const card = cardElement || document.querySelector(`.movie-row[data-id="${id}"]`);

      if (watchedSet.has(id)) {
        watchedSet.delete(id);
        if (card) card.classList.remove("watched");
        showToast(`Removed "${movie.name}" from watched list`);
      } else {
        watchedSet.add(id);
        if (card) card.classList.add("watched");
        showToast(`Marked "${movie.name}" as watched`);
      }

      saveLocalStorage();
      updateStats();
    }



    function updateStats() {
      const count = watchedSet.size;
      const pct = ((count / 250) * 100).toFixed(1);
      document.getElementById("overall-percentage").textContent = `${count} / 250 (${pct}%)`;
      if(barEl) barEl.style.width = pct + "%";

      renderBadges();
    }

    // Render Grid Posters
    function renderGrid() {
      renderMovies(activeList);
    }

    function renderMovies(list) {
      grid.innerHTML = "";

      if (list.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 50px 0; color: var(--text-dark);">
            <i class="fa-solid fa-magnifying-glass-minus" style="font-size: 24px; margin-bottom: 12px;"></i>
            <p>No films matching search filter.</p>
          </div>
        `;
        return;
      }

      list.forEach(movie => {
        const isWatched = watchedSet.has(movie.id);
        const card = document.createElement("div");
        card.className = "movie-row" + (isWatched ? " watched" : "");
        card.dataset.id = movie.id;

        // Render the inner HTML in list format: posters, movie name, rank, director, year
        card.innerHTML = `
          <div class="movie-rank">${movie.rank}</div>
          <div class="movie-poster-container">
            <img class="movie-poster" alt="${movie.title}" src="${movie.poster || ''}" style="${movie.poster ? '' : 'display: none;'}" />
            <div class="placeholder-poster" style="${movie.poster ? 'display: none;' : ''}">
              <i class="fa-solid fa-film"></i>
            </div>
          </div>
          <div class="movie-details">
            <div class="movie-title-row">
              <span class="movie-title">${movie.name}</span>
              <span class="movie-year">(${movie.year})</span>
            </div>
            <div class="movie-meta">
              <span class="movie-director">Dir: ${movie.directors ? movie.directors.join(', ') : 'Unknown'}</span>
            </div>
          </div>
          <div class="movie-status">
            <i class="fa-solid fa-circle-check"></i>
          </div>
        `;

        // Handle image load event for lazy fade-in
        const img = card.querySelector(".movie-poster");
        const placeholder = card.querySelector(".placeholder-poster");
        if (movie.poster && img && placeholder) {
          if (img.complete) {
            img.classList.add("loaded");
            placeholder.style.display = "none";
          } else {
            img.addEventListener("load", () => {
              img.classList.add("loaded");
              placeholder.style.display = "none";
            });
            img.addEventListener("error", () => {
              handleImageError(img, movie);
            });
          }
        }

        card.onclick = () => toggleWatched(movie.id, card);
        grid.appendChild(card);

        if (cardObserver && needsTmdbFetch(movie)) {
          cardObserver.observe(card);
        }
      });
    }

    // Handles fallback when an image URL fails to load
    function handleImageError(imgElement, movie) {
      imgElement.style.display = "none";
      imgElement.classList.remove("loaded");
      const container = imgElement.parentElement;
      if (container) {
        const placeholder = container.querySelector(".placeholder-poster");
        if (placeholder) {
          placeholder.style.display = "flex";
        }
      }
      if (needsTmdbFetch(movie)) {
        prioritizeMovie(movie);
      }
    }

    // Tabs toggle
    function switchTab(tabId) {
      viewHome.style.display = tabId === 'home' ? 'block' : 'none';
      viewWheel.style.display = tabId === 'wheel' ? 'block' : 'none';
      viewBadges.style.display = tabId === 'badges' ? 'block' : 'none';

      btnHome.classList.toggle('active', tabId === 'home');
      btnWheel.classList.toggle('active', tabId === 'wheel');
      btnBadges.classList.toggle('active', tabId === 'badges');
    }

    // Wheel spin functions
    function initWheel() {
      // Clear result card
      wheelResultEl.style.display = "none";
      wheelResultEl.innerHTML = "";
      
      // Get unwatched movies
      const unwatched = movies.filter(m => !watchedSet.has(m.id));
      
      if (unwatched.length === 0) {
        // Draw empty wheel message
        const ctx = wheelCanvas.getContext("2d");
        ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
        ctx.fillStyle = "#181818";
        ctx.beginPath();
        ctx.arc(160, 160, 150, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "14px Outfit";
        ctx.fillText("All movies watched!", 160, 155);
        ctx.fillText("Reset list to spin.", 160, 175);
        wheelSpinBtn.disabled = true;
        return;
      }
      
      wheelSpinBtn.disabled = false;
      
      // Pick 8 random unwatched movies (or repeat if fewer than 8)
      selectedWheelMovies = [];
      const numSlots = 8;
      
      for (let i = 0; i < numSlots; i++) {
        if (unwatched.length > 0) {
          const randomIndex = Math.floor(Math.random() * unwatched.length);
          // To ensure variety, try to pick unique ones first if possible
          const available = unwatched.filter(m => !selectedWheelMovies.includes(m));
          if (available.length > 0) {
            const pick = available[Math.floor(Math.random() * available.length)];
            selectedWheelMovies.push(pick);
          } else {
            selectedWheelMovies.push(unwatched[Math.floor(Math.random() * unwatched.length)]);
          }
        }
      }
      
      // Draw initial wheel
      wheelRotation = 0;
      drawWheel(0);
      
      // Add spin listener
      wheelSpinBtn.onclick = spinWheel;
    }

    function drawWheel(rotation) {
      if (!wheelCanvas) return;
      const ctx = wheelCanvas.getContext("2d");
      const width = wheelCanvas.width;
      const height = wheelCanvas.height;
      const centerX = width / 2;
      const centerY = height / 2;
      const radius = 150;
      
      ctx.clearRect(0, 0, width, height);
      
      const numSectors = selectedWheelMovies.length;
      if (numSectors === 0) return;
      const arc = Math.PI * 2 / numSectors;
      
      const colors = ["#16161f", "#1d1d28", "#121216", "#20202a", "#1a1a22", "#24242e", "#0f0f14", "#282836"];
      
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(rotation);
      ctx.translate(-centerX, -centerY);
      
      for (let i = 0; i < numSectors; i++) {
        const angle = i * arc;
        
        // Draw sector pie slice
        ctx.fillStyle = colors[i % colors.length];
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, angle, angle + arc);
        ctx.closePath();
        ctx.fill();
        
        // Draw sector divider border
        ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        // Draw text
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angle + arc / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
        ctx.font = "600 11px Outfit";
        
        let title = selectedWheelMovies[i].name;
        if (title.length > 18) title = title.substring(0, 16) + "...";
        
        ctx.fillText(title, radius - 15, 4);
        ctx.restore();
      }
      
      ctx.restore();
      
      // Draw inner core hub circle
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(centerX, centerY, 32, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = "#121212";
      ctx.beginPath();
      ctx.arc(centerX, centerY, 28, 0, Math.PI * 2);
      ctx.fill();
    }

    function spinWheel() {
      if (isWheelSpinning) return;
      isWheelSpinning = true;
      wheelSpinBtn.disabled = true;
      wheelResultEl.style.display = "none";
      
      const numSectors = selectedWheelMovies.length;
      const arc = Math.PI * 2 / numSectors;
      
      // Random winner index
      const winnerIndex = Math.floor(Math.random() * numSectors);
      
      const startRotation = wheelRotation % (2 * Math.PI);
      const targetFraction = (1.5 * Math.PI - (winnerIndex * arc + arc / 2)) - startRotation;
      let normalizedFraction = targetFraction;
      while (normalizedFraction < 0) normalizedFraction += 2 * Math.PI;
      
      // Spin at least 5 times
      const targetRotation = wheelRotation + 5 * 2 * Math.PI + normalizedFraction;
      const startRotationVal = wheelRotation;
      
      let startTime = null;
      const duration = 4000; // 4 seconds
      
      function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // cubic ease-out for realistic friction slowing down
        const easeOut = 1 - Math.pow(1 - progress, 4);
        wheelRotation = startRotationVal + (targetRotation - startRotationVal) * easeOut;
        
        drawWheel(wheelRotation);
        
        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isWheelSpinning = false;
          wheelSpinBtn.disabled = false;
          wheelRotation = targetRotation;
          showWinner(selectedWheelMovies[winnerIndex]);
        }
      }
      
      requestAnimationFrame(animate);
    }

    function showWinner(movie) {
      wheelResultEl.innerHTML = `
        <div class="wheel-result-movie">
          <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-copper); font-weight: 700;">Your Recommendation Today</div>
          <div class="wheel-result-title">${movie.name} (${movie.year})</div>
          <div class="wheel-result-meta">Rank #${movie.rank} &bull; Directed by ${movie.directors ? movie.directors.join(', ') : 'Unknown'}</div>
          
          <div class="wheel-result-actions">
            <button class="wheel-btn primary" id="winner-watch-btn">Mark as Watched</button>
            <button class="wheel-btn secondary" id="winner-spin-again">Spin Again</button>
          </div>
        </div>
      `;
      
      wheelResultEl.style.display = "block";
      
      // Hook up actions
      document.getElementById("winner-spin-again").onclick = () => {
        initWheel();
        spinWheel();
      };
      
      const watchBtn = document.getElementById("winner-watch-btn");
      watchBtn.onclick = () => {
        // Toggle watched in database
        toggleWatched(movie.id, null);
        // Change button state
        watchBtn.textContent = "Watched!";
        watchBtn.disabled = true;
        watchBtn.style.opacity = 0.5;
      };
    }

    // Render Badges
    function renderBadges() {
      badgeList.innerHTML = "";

      ACHIEVEMENTS.forEach(badge => {
        const card = document.createElement("div");
        card.className = "badge-card";
        card.id = `badge-card-${badge.id}`;

        card.innerHTML = `
          <div class="badge-icon">
            <i class="fa-solid ${badge.icon}"></i>
          </div>
          <div class="badge-info">
            <div class="badge-title">${badge.title}</div>
            <div class="badge-desc">${badge.desc}</div>
            <div class="badge-progress-track">
              <div class="badge-progress-fill" id="badge-fill-${badge.id}"></div>
            </div>
          </div>
        `;

        badgeList.appendChild(card);
      });

      calculateBadgesProgress();
    }

    function calculateBadgesProgress() {
      let unlockedCount = 0;
      const watchedMovies = movies.filter(m => watchedSet.has(m.id));

      ACHIEVEMENTS.forEach(badge => {
        let current = 0;
        if (badge.type === "count") {
          current = watchedMovies.length;
        } else if (badge.type === "director") {
          current = watchedMovies.filter(m => m.directors && m.directors.some(d => d.toLowerCase().includes(badge.director.toLowerCase()))).length;
        } else if (badge.type === "genre") {
          current = watchedMovies.filter(m => m.genre && m.genre.some(g => g.toLowerCase().includes(badge.genre.toLowerCase()))).length;
        } else if (badge.type === "year") {
          current = watchedMovies.filter(m => m.year < badge.yearLimit).length;
        } else if (badge.type === "year_modern") {
          current = watchedMovies.filter(m => m.year >= badge.yearLimit).length;
        } else if (badge.type === "special_godfather") {
          current = watchedMovies.filter(m => m.name.includes("The Godfather")).length;
        }

        const pct = Math.min(100, (current / badge.target) * 100);
        const fillEl = document.getElementById(`badge-fill-${badge.id}`);
        const cardEl = document.getElementById(`badge-card-${badge.id}`);

        if (fillEl) fillEl.style.width = pct + "%";

        if (current >= badge.target) {
          if (cardEl) cardEl.classList.add("unlocked");
          unlockedCount++;
        } else {
          if (cardEl) cardEl.classList.remove("unlocked");
        }
      });

      document.getElementById("unlocked-count").textContent = unlockedCount;
    }



    // Cross-tab sync event
    window.addEventListener("storage", (e) => {
      if (e.key === WATCHED_KEY) {
        loadLocalStorage();
        if (movies.length > 0) {
          updateStats();
          renderMovies(activeList);
          calculateBadgesProgress();
        }
      }
    });
  </script>
