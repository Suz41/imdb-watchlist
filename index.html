<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IMDb Top 250 — Achievements &amp; Poster Tracker</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="An interactive grid-based completion tracker for the IMDb Top 250 all-time movies with achievements, dynamic statistics, and synchronization." />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0a;
      --bg-surface: #121212;
      --bg-card: #181818;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.3);
      --accent: #ffffff;
      --accent-copper: #888888;
      --text: #ffffff;
      --text-dim: #a0a0a0;
      --text-dark: #555555;
      --glass: rgba(10, 10, 10, 0.8);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.4;
      overflow-x: hidden;
      padding-bottom: 80px; /* Space for bottom nav on mobile */
    }



    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Ambient background lighting */
    .ambient-header {
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
      padding: 30px 0;
      border-bottom: 1px solid var(--border);
    }

    /* Global Progress Header */
    .progress-bar-container {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(to right, var(--accent-copper), var(--accent));
      width: 0%;
      transition: width 0.5s ease;
    }



    /* List Layout for movies */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 10px 0 50px;
      max-width: 800px;
      margin: 0 auto;
    }

    .movie-row {
      display: flex;
      align-items: center;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      user-select: none;
    }

    .movie-row:hover {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.02);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.02);
    }

    .movie-rank {
      font-family: var(--font-body);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-copper);
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }

    .movie-poster-container {
      width: 48px;
      height: 72px;
      border-radius: 4px;
      overflow: hidden;
      background: #16161f;
      position: relative;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .movie-poster-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    .movie-poster-container img.loaded {
      opacity: 1;
    }

    .placeholder-poster {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dark);
      font-size: 18px;
      background: linear-gradient(135deg, #16161f 0%, #0e0e12 100%);
    }

    .movie-details {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .movie-title-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .movie-title {
      font-weight: 600;
      font-size: 15px;
      color: #fff;
    }

    .movie-year {
      font-size: 12px;
      color: var(--text-dim);
    }

    .movie-meta {
      font-size: 12px;
      color: var(--text-dark);
    }

    .movie-status {
      font-size: 18px;
      color: var(--text-dark);
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    /* Watched State in List Layout */
    .movie-row.watched {
      background: rgba(255, 255, 255, 0.01);
      border-color: rgba(255, 255, 255, 0.04);
    }

    .movie-row.watched .movie-rank,
    .movie-row.watched .movie-title,
    .movie-row.watched .movie-year,
    .movie-row.watched .movie-meta {
      color: var(--text-dark) !important;
    }

    .movie-row.watched .movie-poster-container img {
      filter: grayscale(100%) contrast(0.8);
      opacity: 0.15 !important;
    }

    .movie-row.watched .movie-status {
      color: var(--accent);
    }

    /* Achievements Grid */
    .badges-view {
      display: none;
      padding: 20px 0 50px;
    }

    .badges-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .badge-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      gap: 15px;
      transition: all 0.3s ease;
      opacity: 0.55;
      filter: grayscale(100%);
    }

    .badge-card.unlocked {
      opacity: 1;
      filter: none;
      border-color: var(--border-hover);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.02);
    }

    .badge-icon {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .badge-card.unlocked .badge-icon {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent);
      color: var(--accent);
    }

    .badge-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .badge-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .badge-card.unlocked .badge-title {
      color: #fff;
    }

    .badge-desc {
      font-size: 11px;
      color: var(--text-dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .badge-card.unlocked .badge-desc {
      color: var(--text-dim);
    }

    .badge-progress-track {
      height: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .badge-progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Loader */
    .loader-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      color: var(--text-dim);
      gap: 15px;
    }

    .spinner {
      border: 3px solid rgba(255,255,255,0.05);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Suggest Tab styling */
    .wheel-view {
      display: none;
      padding: 20px 0 50px;
    }

    .suggest-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .suggest-container {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }

    .suggest-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
      min-height: 400px;
      position: relative;
    }

    .suggest-card-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .suggest-card-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent-copper);
      font-weight: 800;
    }

    .suggest-card-desc {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Content Area inside Suggest Cards */
    .suggest-content {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    /* Mystery Shuffler Card UI */
    .mystery-box {
      width: 120px;
      height: 180px;
      background: #16161f;
      border: 2px dashed rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--text-dark);
      transition: all 0.3s ease;
    }

    .mystery-box.shuffling {
      border-color: var(--accent);
      color: var(--accent);
      animation: pulse 0.5s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); opacity: 0.8; }
      to { transform: scale(1.05); opacity: 1; }
    }

    /* Shuffling text transition */
    .shuffle-title-transition {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-dim);
      filter: blur(4px);
      transition: filter 0.1s ease;
      height: 24px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
      text-align: center;
      margin-top: 15px;
    }

    .shuffle-title-transition.clear {
      filter: none;
      color: #fff;
    }

    /* Winner Presentation Layout */
    .recommendation-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      animation: fadeIn 0.4s ease;
    }

    .rec-poster-container {
      width: 90px;
      height: 135px;
      border-radius: 6px;
      overflow: hidden;
      background: #16161f;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .rec-poster-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .rec-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .rec-meta {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    .suggest-actions {
      display: flex;
      gap: 10px;
      width: 100%;
      justify-content: center;
      margin-top: 10px;
    }

    /* General recommendation button styles */
    .suggest-btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
    }

    .suggest-btn.primary {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .suggest-btn.primary:hover:not(:disabled) {
      background: #e0e0e0;
      border-color: #e0e0e0;
    }

    .suggest-btn.secondary {
      background: transparent;
      color: #fff;
    }

    .suggest-btn.secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.05);
    }

    .suggest-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Bottom sticky navigation for mobile views */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: rgba(14, 14, 18, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      z-index: 99;
    }

    .nav-btn {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .nav-btn i {
      font-size: 16px;
    }

    .nav-btn.active {
      color: var(--accent);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(14, 14, 18, 0.9);
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .toast.show {
      opacity: 1;
    }

    /* Minimal movie rank number badge */
    .rank-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      z-index: 5;
      font-family: var(--font-body);
      pointer-events: none;
    }
  </style>
</head>
<body>



  <!-- Ambient Header -->
  <div class="ambient-header">
    <div class="container">


      <!-- Completion Progress -->
      <div class="progress-bar-container">
        <div class="progress-labels" style="justify-content: center;">
          <span id="overall-percentage">0 / 250 (0.0%)</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="overall-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <main class="container">
    <!-- Grid View Tab Content -->
    <div id="home-view">


      <div class="grid" id="grid">
        <div class="loader-overlay" id="loading-spinner">
          <div class="spinner"></div>
          <span>Loading movies database...</span>
        </div>
      </div>
    </div>

    <!-- Achievements Tab Content -->
    <div id="badges-view" class="badges-view">
      <div class="badges-grid" id="badge-list">
        <!-- Injected Dynamically -->
      </div>
    </div>

    <!-- Suggestions Tab Content -->
    <div id="wheel-view" class="wheel-view">
      <div class="suggest-container">
        
        <!-- Daily Recommendation Card -->
        <div class="suggest-card">
          <div class="suggest-card-header">
            <div class="suggest-card-title">Daily Pick</div>
            <div class="suggest-card-desc">Your cinematic recommendation for today</div>
          </div>
          <div class="suggest-content" id="daily-content">
            <!-- Injected Dynamically -->
          </div>
        </div>

        <!-- Shuffle Recommendation Card -->
        <div class="suggest-card">
          <div class="suggest-card-header">
            <div class="suggest-card-title">Surprise Me</div>
            <div class="suggest-card-desc">Shuffle to recommend a random movie</div>
          </div>
          <div class="suggest-content" id="shuffle-content">
            <!-- Injected Dynamically -->
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <div class="nav-btn active" id="btn-home">
      <i class="fa-solid fa-grip"></i>
      <span>Home</span>
    </div>
    <div class="nav-btn" id="btn-wheel">
      <i class="fa-solid fa-shuffle"></i>
      <span>Suggest</span>
    </div>
    <div class="nav-btn" id="btn-badges">
      <i class="fa-solid fa-award"></i>
      <span>Badges (<span id="unlocked-count">0</span>/10)</span>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    // Storage Keys
    const WATCHED_KEY = "imdb_tracker_list_v2";

    // Hardcoded TMDB API Key from user configuration
    const API_KEY = "4f09deb9e0cba637e35e8490ba35dd3f";

    // Load Custom Cached Posters from LocalStorage
    let apiPosters = {};
    try {
      const saved = localStorage.getItem('imdb_api_posters_v2');
      if (saved) apiPosters = JSON.parse(saved);
    } catch(e) {}

    // Application States
    let movies = [];
    let activeList = [];
    let watchedSet = new Set();

    // Badges definitions
    const ACHIEVEMENTS = [
      { id: "b1", title: "Cinephile Novice", desc: "Watch at least 5 movies from the list.", icon: "fa-medal", type: "count", target: 5 },
      { id: "b2", title: "Cinema Buff", desc: "Watch at least 25 movies from the list.", icon: "fa-award", type: "count", target: 25 },
      { id: "b3", title: "Cinephile Elite", desc: "Watch at least 100 movies from the list.", icon: "fa-crown", type: "count", target: 100 },
      { id: "b4", title: "IMDb Master", desc: "Watch all 250 movies from the list.", icon: "fa-trophy", type: "count", target: 250 },
      { id: "nolan", title: "Nolan Disciple", desc: "Watch 5 Christopher Nolan films.", icon: "fa-brain", type: "director", director: "Christopher Nolan", target: 5 },
      { id: "godfather", title: "The Family", desc: "Watch both The Godfather and The Godfather Part II.", icon: "fa-handshake", type: "special_godfather", target: 2 },
      { id: "classics", title: "Vintage Explorer", desc: "Watch 10 movies released before 1970.", icon: "fa-hourglass-half", type: "year", yearLimit: 1970, target: 10 },
      { id: "modern", title: "Modern Masterpieces", desc: "Watch 15 movies released in 2010 or later.", icon: "fa-bolt", type: "year_modern", yearLimit: 2010, target: 15 },
      { id: "scifi", title: "Sci-Fi Explorer", desc: "Watch 8 Sci-Fi movies.", icon: "fa-user-astronaut", type: "genre", genre: "Sci-Fi", target: 8 },
      { id: "crime", title: "Crime Syndicate", desc: "Watch 8 Crime movies.", icon: "fa-user-secret", type: "genre", genre: "Crime", target: 8 }
    ];

    // DOM cache
    let grid, badgeList, barEl, viewHome, viewBadges, viewWheel, btnHome, btnBadges, btnWheel;
    let dailyContentEl, shuffleContentEl;
    let isShuffling = false;

    // Initialize application on DOM load
    window.addEventListener("DOMContentLoaded", () => {
      grid = document.getElementById("grid");
      badgeList = document.getElementById("badge-list");
      barEl = document.getElementById("overall-fill");
      viewHome = document.getElementById("home-view");
      viewBadges = document.getElementById("badges-view");
      viewWheel = document.getElementById("wheel-view");
      btnHome = document.getElementById("btn-home");
      btnBadges = document.getElementById("btn-badges");
      btnWheel = document.getElementById("btn-wheel");
      
      dailyContentEl = document.getElementById("daily-content");
      shuffleContentEl = document.getElementById("shuffle-content");

      init();
    });

    let cardObserver;
    const queue = [];
    let isFetching = false;

    function init() {
      loadLocalStorage();
      setupCardObserver();
      loadDatabase();
      setupListeners();
    }

    function loadLocalStorage() {
      const stored = localStorage.getItem(WATCHED_KEY);
      if (stored) {
        try {
          const list = JSON.parse(stored);
          watchedSet = new Set(list);
        } catch(e) {}
      }

      // Clear "failed" entries to re-fetch with improved fallback algorithm
      let changed = false;
      for (const title in apiPosters) {
        if (apiPosters[title] === "failed") {
          delete apiPosters[title];
          changed = true;
        }
      }
      if (changed) {
        localStorage.setItem('imdb_api_posters_v2', JSON.stringify(apiPosters));
      }
    }

    function saveLocalStorage() {
      localStorage.setItem(WATCHED_KEY, JSON.stringify(Array.from(watchedSet)));
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove("show"), 2500);
    }

    // Load static local database
    async function loadDatabase() {
      try {
        const response = await fetch('./movies-250.json');
        if (!response.ok) throw new Error("Failed to load local JSON file");
        const data = await response.json();
        
        movies = data;
        // Assign rank numbers and ID strings based on rating sort
        movies.forEach((m, idx) => {
          m.rank = idx + 1;
          m.id = `m${idx + 1}`;
          m.title = m.name; // map name to title for TMDB loop
          
          // Use cached TMDB poster, or load dynamically in viewport
          const cached = apiPosters[m.title];
          if (cached && cached !== "failed") {
            m.poster = cached;
          } else {
            m.poster = undefined;
          }
        });

        activeList = [...movies];
        
        updateStats();
        renderMovies(activeList);
        
        // Dynamically start fetching missing TMDB poster art in background
        initFetchQueue();
      } catch (err) {
        console.error("Error loading JSON database:", err);
        grid.innerHTML = `
          <div class="loader-overlay" style="color: var(--text-dim); text-align: center;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 32px; margin-bottom: 12px; color: var(--text-dark);"></i>
            <p style="font-weight: 600;">Failed to load movies-250.json</p>
            <p style="font-size: 13px; opacity: 0.8; margin-top: 5px;">Ensure the file is present in your server's root folder.</p>
          </div>
        `;
      }
    }

    // Setup input and click event listeners
    function setupListeners() {
      btnHome.addEventListener("click", () => switchTab('home'));
      btnWheel.addEventListener("click", () => {
        switchTab('wheel');
        initSuggestions();
      });
      btnBadges.addEventListener("click", () => switchTab('badges'));
    }

    // Determine if movie still needs a TMDB query
    function needsTmdbFetch(movie) {
      return apiPosters[movie.title] === undefined;
    }

    // Setup IntersectionObserver to prioritize viewport fetching
    function setupCardObserver() {
      if (!('IntersectionObserver' in window)) return;
      
      cardObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const card = entry.target;
            const movieId = card.dataset.id;
            const movie = movies.find(m => m.id === movieId);
            if (movie && needsTmdbFetch(movie)) {
              prioritizeMovie(movie);
            }
            cardObserver.unobserve(card);
          }
        });
      }, {
        root: null,
        rootMargin: "100px 0px 100px 0px", // prefetch 100px before coming on screen
        threshold: 0.01
      });
    }

    // Push movie to the front of TMDB fetch queue
    function prioritizeMovie(movie) {
      if (!needsTmdbFetch(movie)) return;
      
      const idx = queue.findIndex(m => m.id === movie.id);
      if (idx > -1) {
        queue.splice(idx, 1);
      }
      queue.unshift(movie);
      processQueue();
    }

    // Background fetch initialization
    function initFetchQueue() {
      movies.forEach(m => {
        if (needsTmdbFetch(m)) {
          queue.push(m);
        }
      });
      processQueue();
    }

    // Serialized fetch worker with rate limit delay
    async function processQueue() {
      if (isFetching) return;
      isFetching = true;
      
      while (queue.length > 0) {
        const movie = queue.shift();
        if (needsTmdbFetch(movie)) {
          await fetchMoviePoster(movie);
          await new Promise(r => setTimeout(r, 250)); // 250ms delay to prevent rate limit
        }
      }
      
      isFetching = false;
    }

    // Fetch poster for a movie from TMDB
    async function fetchMoviePoster(movie) {
      try {
        let url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(movie.title)}&primary_release_year=${movie.year}`;
        let res = await fetch(url);
        if (!res.ok) {
          console.error("TMDB API request failed with status", res.status);
          return; // Skip caching as failed if network error
        }
        let data = await res.json();
        if (data.success === false) {
          console.error("TMDB API returned error:", data.status_message);
          return; // Skip caching as failed if API key or authorization error
        }
        
        // Fallback: search without release year constraint if strict filtering returns no results
        if ((!data.results || data.results.length === 0) && movie.year) {
          url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(movie.title)}`;
          res = await fetch(url);
          if (!res.ok) {
            console.error("TMDB Fallback API request failed with status", res.status);
            return;
          }
          data = await res.json();
          if (data.success === false) {
            console.error("TMDB Fallback API returned error:", data.status_message);
            return;
          }
        }
        
        if (data.results && data.results.length > 0 && data.results[0].poster_path) {
          const posterUrl = `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
          movie.poster = posterUrl;
          apiPosters[movie.title] = posterUrl;
          localStorage.setItem('imdb_api_posters_v2', JSON.stringify(apiPosters));
          
          // Dynamically swap the image inside the card if visible on screen
          const card = document.querySelector(`.movie-row[data-id="${movie.id}"]`);
          if (card) {
            const img = card.querySelector(".movie-poster");
            const placeholder = card.querySelector(".placeholder-poster");
            if (img && placeholder) {
              img.src = posterUrl;
              img.style.display = "block";
              if (img.complete) {
                img.classList.add("loaded");
                placeholder.style.display = "none";
              } else {
                img.addEventListener("load", () => {
                  img.classList.add("loaded");
                  placeholder.style.display = "none";
                });
                img.addEventListener("error", () => {
                  handleImageError(img, movie);
                });
              }
            }
          }
        } else {
          // If TMDB returns no results, store "failed" in cache to skip in future
          apiPosters[movie.title] = "failed";
          localStorage.setItem('imdb_api_posters_v2', JSON.stringify(apiPosters));
        }
      } catch(err) {
        console.error("Fetch error for", movie.title, err);
      }
    }

    // Toggle movie watched status
    function toggleWatched(id, cardElement) {
      const movie = movies.find(m => m.id === id);
      if (!movie) return;

      const card = cardElement || document.querySelector(`.movie-row[data-id="${id}"]`);

      if (watchedSet.has(id)) {
        watchedSet.delete(id);
        if (card) card.classList.remove("watched");
        showToast(`Removed "${movie.name}" from watched list`);
      } else {
        watchedSet.add(id);
        if (card) card.classList.add("watched");
        showToast(`Marked "${movie.name}" as watched`);
      }

      saveLocalStorage();
      updateStats();
    }



    function updateStats() {
      const count = watchedSet.size;
      const pct = ((count / 250) * 100).toFixed(1);
      document.getElementById("overall-percentage").textContent = `${count} / 250 (${pct}%)`;
      if(barEl) barEl.style.width = pct + "%";

      renderBadges();
    }

    // Render Grid Posters
    function renderGrid() {
      renderMovies(activeList);
    }

    function renderMovies(list) {
      grid.innerHTML = "";

      if (list.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 50px 0; color: var(--text-dark);">
            <i class="fa-solid fa-magnifying-glass-minus" style="font-size: 24px; margin-bottom: 12px;"></i>
            <p>No films matching search filter.</p>
          </div>
        `;
        return;
      }

      list.forEach(movie => {
        const isWatched = watchedSet.has(movie.id);
        const card = document.createElement("div");
        card.className = "movie-row" + (isWatched ? " watched" : "");
        card.dataset.id = movie.id;

        // Render the inner HTML in list format: posters, movie name, rank, director, year
        card.innerHTML = `
          <div class="movie-rank">${movie.rank}</div>
          <div class="movie-poster-container">
            <img class="movie-poster" alt="${movie.title}" src="${movie.poster || ''}" style="${movie.poster ? '' : 'display: none;'}" />
            <div class="placeholder-poster" style="${movie.poster ? 'display: none;' : ''}">
              <i class="fa-solid fa-film"></i>
            </div>
          </div>
          <div class="movie-details">
            <div class="movie-title-row">
              <span class="movie-title">${movie.name}</span>
              <span class="movie-year">(${movie.year})</span>
            </div>
            <div class="movie-meta">
              <span class="movie-director">Dir: ${movie.directors ? movie.directors.join(', ') : 'Unknown'}</span>
            </div>
          </div>
          <div class="movie-status">
            <i class="fa-solid fa-circle-check"></i>
          </div>
        `;

        // Handle image load event for lazy fade-in
        const img = card.querySelector(".movie-poster");
        const placeholder = card.querySelector(".placeholder-poster");
        if (movie.poster && img && placeholder) {
          if (img.complete) {
            img.classList.add("loaded");
            placeholder.style.display = "none";
          } else {
            img.addEventListener("load", () => {
              img.classList.add("loaded");
              placeholder.style.display = "none";
            });
            img.addEventListener("error", () => {
              handleImageError(img, movie);
            });
          }
        }

        card.onclick = () => toggleWatched(movie.id, card);
        grid.appendChild(card);

        if (cardObserver && needsTmdbFetch(movie)) {
          cardObserver.observe(card);
        }
      });
    }

    // Handles fallback when an image URL fails to load
    function handleImageError(imgElement, movie) {
      imgElement.style.display = "none";
      imgElement.classList.remove("loaded");
      const container = imgElement.parentElement;
      if (container) {
        const placeholder = container.querySelector(".placeholder-poster");
        if (placeholder) {
          placeholder.style.display = "flex";
        }
      }
      if (needsTmdbFetch(movie)) {
        prioritizeMovie(movie);
      }
    }

    // Tabs toggle
    function switchTab(tabId) {
      viewHome.style.display = tabId === 'home' ? 'block' : 'none';
      viewWheel.style.display = tabId === 'wheel' ? 'block' : 'none';
      viewBadges.style.display = tabId === 'badges' ? 'block' : 'none';

      btnHome.classList.toggle('active', tabId === 'home');
      btnWheel.classList.toggle('active', tabId === 'wheel');
      btnBadges.classList.toggle('active', tabId === 'badges');
    }

    // Suggestions generation functions
    function initSuggestions() {
      initDailyPick();
      initShufflePick(false);
    }

    function initDailyPick() {
      dailyContentEl.innerHTML = "";
      
      const today = new Date();
      const dateStr = today.getFullYear() + "-" + (today.getMonth() + 1) + "-" + today.getDate();
      
      let dailyPick = null;
      try {
        const saved = localStorage.getItem('imdb_daily_pick_v2');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed.date === dateStr) {
            const found = movies.find(m => m.id === parsed.id);
            if (found && !watchedSet.has(found.id)) {
              dailyPick = found;
            }
          }
        }
      } catch(e) {}
      
      // If no valid daily pick saved for today, select a new one from unwatched
      if (!dailyPick) {
        const unwatched = movies.filter(m => !watchedSet.has(m.id));
        if (unwatched.length === 0) {
          dailyContentEl.innerHTML = `
            <div style="color: var(--text-dark); margin: auto 0;">
              <i class="fa-solid fa-circle-check" style="font-size: 32px; margin-bottom: 10px;"></i>
              <p>All movies watched!</p>
            </div>
          `;
          return;
        }
        
        // Pick deterministically based on date seed
        let hash = 0;
        for (let i = 0; i < dateStr.length; i++) {
          hash = (hash << 5) - hash + dateStr.charCodeAt(i);
          hash |= 0;
        }
        const index = Math.abs(hash) % unwatched.length;
        dailyPick = unwatched[index];
        
        // Save to localStorage
        localStorage.setItem('imdb_daily_pick_v2', JSON.stringify({date: dateStr, id: dailyPick.id}));
      }
      
      const isWatched = watchedSet.has(dailyPick.id);
      
      // Render daily movie card
      dailyContentEl.innerHTML = `
        <div class="recommendation-card">
          <div class="rec-poster-container">
            ${dailyPick.poster ? `<img src="${dailyPick.poster}" alt="${dailyPick.title}" />` : `
              <div class="placeholder-poster" style="display: flex; background: linear-gradient(135deg, #16161f 0%, #0e0e12 100%);">
                <i class="fa-solid fa-film"></i>
              </div>
            `}
          </div>
          <div class="rec-title">${dailyPick.name} (${dailyPick.year})</div>
          <div class="rec-meta">Rank #${dailyPick.rank} &bull; Dir: ${dailyPick.directors ? dailyPick.directors.join(', ') : 'Unknown'}</div>
          <div class="suggest-actions">
            <button class="suggest-btn primary" id="daily-watch-btn" ${isWatched ? 'disabled' : ''}>
              ${isWatched ? 'Watched' : 'Mark as Watched'}
            </button>
          </div>
        </div>
      `;
      
      const watchBtn = document.getElementById("daily-watch-btn");
      if (watchBtn && !isWatched) {
        watchBtn.onclick = () => {
          toggleWatched(dailyPick.id, null);
          watchBtn.textContent = "Watched";
          watchBtn.disabled = true;
        };
      }
    }

    function initShufflePick(autoStart) {
      if (autoStart) {
        startShuffle();
      } else {
        // Show initial Mystery state
        shuffleContentEl.innerHTML = `
          <div class="mystery-box">
            <i class="fa-solid fa-question"></i>
          </div>
          <div style="margin-top: 10px; width: 100%; display: flex; justify-content: center;">
            <button class="suggest-btn primary" id="start-shuffle-btn">Shuffle Movie</button>
          </div>
        `;
        document.getElementById("start-shuffle-btn").onclick = startShuffle;
      }
    }

    function startShuffle() {
      if (isShuffling) return;
      isShuffling = true;
      
      const unwatched = movies.filter(m => !watchedSet.has(m.id));
      if (unwatched.length === 0) {
        shuffleContentEl.innerHTML = `
          <div style="color: var(--text-dark); margin: auto 0;">
            <i class="fa-solid fa-circle-check" style="font-size: 32px; margin-bottom: 10px;"></i>
            <p>All movies watched!</p>
          </div>
        `;
        isShuffling = false;
        return;
      }
      
      // Shuffle animation: cycle random movie titles rapidly
      shuffleContentEl.innerHTML = `
        <div class="mystery-box shuffling">
          <i class="fa-solid fa-shuffle fa-spin"></i>
        </div>
        <div class="shuffle-title-transition" id="shuffle-transition-text">Selecting...</div>
      `;
      
      const textEl = document.getElementById("shuffle-transition-text");
      
      let count = 0;
      const interval = setInterval(() => {
        const rand = unwatched[Math.floor(Math.random() * unwatched.length)];
        if (textEl) textEl.textContent = rand.name;
        count++;
        
        if (count >= 15) {
          clearInterval(interval);
          isShuffling = false;
          
          // Select final winner
          const winner = unwatched[Math.floor(Math.random() * unwatched.length)];
          showShuffleWinner(winner);
        }
      }, 90);
    }

    function showShuffleWinner(movie) {
      const isWatched = watchedSet.has(movie.id);
      
      shuffleContentEl.innerHTML = `
        <div class="recommendation-card">
          <div class="rec-poster-container">
            ${movie.poster ? `<img src="${movie.poster}" alt="${movie.title}" />` : `
              <div class="placeholder-poster" style="display: flex; background: linear-gradient(135deg, #16161f 0%, #0e0e12 100%);">
                <i class="fa-solid fa-film"></i>
              </div>
            `}
          </div>
          <div class="rec-title">${movie.name} (${movie.year})</div>
          <div class="rec-meta">Rank #${movie.rank} &bull; Dir: ${movie.directors ? movie.directors.join(', ') : 'Unknown'}</div>
          <div class="suggest-actions">
            <button class="suggest-btn primary" id="shuffle-watch-btn" ${isWatched ? 'disabled' : ''}>
              ${isWatched ? 'Watched' : 'Mark as Watched'}
            </button>
            <button class="suggest-btn secondary" id="shuffle-again-btn">
              Shuffle Again
            </button>
          </div>
        </div>
      `;
      
      const watchBtn = document.getElementById("shuffle-watch-btn");
      if (watchBtn && !isWatched) {
        watchBtn.onclick = () => {
          toggleWatched(movie.id, null);
          watchBtn.textContent = "Watched";
          watchBtn.disabled = true;
        };
      }
      
      document.getElementById("shuffle-again-btn").onclick = startShuffle;
    }

    // Render Badges
    function renderBadges() {
      badgeList.innerHTML = "";

      ACHIEVEMENTS.forEach(badge => {
        const card = document.createElement("div");
        card.className = "badge-card";
        card.id = `badge-card-${badge.id}`;

        card.innerHTML = `
          <div class="badge-icon">
            <i class="fa-solid ${badge.icon}"></i>
          </div>
          <div class="badge-info">
            <div class="badge-title">${badge.title}</div>
            <div class="badge-desc">${badge.desc}</div>
            <div class="badge-progress-track">
              <div class="badge-progress-fill" id="badge-fill-${badge.id}"></div>
            </div>
          </div>
        `;

        badgeList.appendChild(card);
      });

      calculateBadgesProgress();
    }

    function calculateBadgesProgress() {
      let unlockedCount = 0;
      const watchedMovies = movies.filter(m => watchedSet.has(m.id));

      ACHIEVEMENTS.forEach(badge => {
        let current = 0;
        if (badge.type === "count") {
          current = watchedMovies.length;
        } else if (badge.type === "director") {
          current = watchedMovies.filter(m => m.directors && m.directors.some(d => d.toLowerCase().includes(badge.director.toLowerCase()))).length;
        } else if (badge.type === "genre") {
          current = watchedMovies.filter(m => m.genre && m.genre.some(g => g.toLowerCase().includes(badge.genre.toLowerCase()))).length;
        } else if (badge.type === "year") {
          current = watchedMovies.filter(m => m.year < badge.yearLimit).length;
        } else if (badge.type === "year_modern") {
          current = watchedMovies.filter(m => m.year >= badge.yearLimit).length;
        } else if (badge.type === "special_godfather") {
          current = watchedMovies.filter(m => m.name.includes("The Godfather")).length;
        }

        const pct = Math.min(100, (current / badge.target) * 100);
        const fillEl = document.getElementById(`badge-fill-${badge.id}`);
        const cardEl = document.getElementById(`badge-card-${badge.id}`);

        if (fillEl) fillEl.style.width = pct + "%";

        if (current >= badge.target) {
          if (cardEl) cardEl.classList.add("unlocked");
          unlockedCount++;
        } else {
          if (cardEl) cardEl.classList.remove("unlocked");
        }
      });

      document.getElementById("unlocked-count").textContent = unlockedCount;
    }



    // Cross-tab sync event
    window.addEventListener("storage", (e) => {
      if (e.key === WATCHED_KEY) {
        loadLocalStorage();
        if (movies.length > 0) {
          updateStats();
          renderMovies(activeList);
          calculateBadgesProgress();
        }
      }
    });
  </script>
