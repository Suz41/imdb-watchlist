<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IMDb Top 250 — Achievements &amp; Poster Tracker</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="An interactive grid-based completion tracker for the IMDb Top 250 all-time movies with achievements, dynamic statistics, and synchronization." />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0a;
      --bg-surface: #121212;
      --bg-card: #181818;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.3);
      --accent: #ffffff;
      --accent-copper: #888888;
      --text: #ffffff;
      --text-dim: #a0a0a0;
      --text-dark: #555555;
      --glass: rgba(10, 10, 10, 0.8);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.4;
      overflow-x: hidden;
      padding-bottom: 80px; /* Space for bottom nav on mobile */
    }

    /* Header styling */
    header {
      position: sticky;
      top: 0;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 14px 0;
    }

    .header-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .header-left {
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .logo h1 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo span {
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font-body);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .nav-link:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-link.active {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      font-weight: 600;
    }

    .header-right {
      display: flex;
      align-items: center;
    }

    .quick-stats-pill {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .quick-stats-pill span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    @media (max-width: 600px) {
      .header-wrap {
        flex-direction: column;
        gap: 12px;
      }
      .header-nav {
        gap: 12px;
      }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Ambient background lighting */
    .ambient-header {
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
      padding: 40px 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .title-area {
      text-align: center;
      margin-bottom: 24px;
    }

    .title-area h1 {
      font-family: var(--font-display);
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .title-area span {
      background: var(--accent);
      color: #000;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Global Progress Header */
    .progress-bar-container {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(to right, var(--accent-copper), var(--accent));
      width: 0%;
      transition: width 0.5s ease;
    }

    /* Filters and Search Bar */
    .filter-panel {
      margin: 30px auto;
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 15px;
    }

    @media (max-width: 576px) {
      .filter-panel {
        grid-template-columns: 1fr;
      }
    }

    .search-box-wrap {
      position: relative;
    }

    .search-box-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dark);
    }

    .search-box {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px 12px 42px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 14px;
      width: 100%;
      transition: all 0.2s;
    }

    .search-box:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
    }

    .sort-dropdown {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
    }

    .sort-dropdown:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Grid Layout for posters */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      padding: 10px 0 50px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
    }

    .poster {
      position: relative;
      aspect-ratio: 2/3;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .poster:hover {
      transform: translateY(-4px) scale(1.03);
      border-color: var(--border-hover);
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.08);
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease, transform 0.4s ease;
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0;
    }

    .poster:hover img {
      transform: scale(1.05);
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      text-align: center;
      background: linear-gradient(135deg, #16161f 0%, #0e0e12 100%);
      z-index: 0;
    }

    .placeholder .rank {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-copper);
      line-height: 1;
    }

    .placeholder .title {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.3;
      font-weight: 500;
    }

    /* Watched state */
    .poster.watched img {
      filter: grayscale(100%) contrast(0.8);
      opacity: 0.22;
    }

    .poster.watched .placeholder {
      opacity: 0.35;
    }

    .poster.watched::after {
      content: "\f00c";
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      z-index: 2;
      animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    /* Achievements Grid */
    .badges-view {
      display: none;
      padding: 20px 0 50px;
    }

    .badges-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .badge-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      gap: 15px;
      transition: all 0.3s ease;
      opacity: 0.55;
      filter: grayscale(100%);
    }

    .badge-card.unlocked {
      opacity: 1;
      filter: none;
      border-color: var(--border-hover);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.02);
    }

    .badge-icon {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .badge-card.unlocked .badge-icon {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent);
      color: var(--accent);
    }

    .badge-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .badge-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .badge-card.unlocked .badge-title {
      color: #fff;
    }

    .badge-desc {
      font-size: 11px;
      color: var(--text-dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .badge-card.unlocked .badge-desc {
      color: var(--text-dim);
    }

    .badge-progress-track {
      height: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .badge-progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Loader */
    .loader-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      color: var(--text-dim);
      gap: 15px;
    }

    .spinner {
      border: 3px solid rgba(255,255,255,0.05);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Bottom sticky navigation for mobile views */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: rgba(14, 14, 18, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      z-index: 99;
    }

    .nav-btn {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .nav-btn i {
      font-size: 16px;
    }

    .nav-btn.active {
      color: var(--accent);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(14, 14, 18, 0.9);
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .toast.show {
      opacity: 1;
    }

    /* Minimal movie rank number badge */
    .rank-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      z-index: 5;
      font-family: var(--font-body);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Sticky Top Header -->
  <header>
    <div class="container header-wrap">
      <div class="header-left">
        <a href="index.html" class="logo">
          <h1>Cinematique</h1>
          <span>ARCHIVE</span>
        </a>
      </div>

      <div class="header-right">
        <div class="quick-stats-pill" id="nav-stats-completed">
          <span><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Ambient Header -->
  <div class="ambient-header">
    <div class="container">
      <div class="title-area">
        <h1>IMDb Top 250</h1>
        <span>All-Time Cinematic Canon</span>
      </div>

      <!-- Completion Progress -->
      <div class="progress-bar-container">
        <div class="progress-labels">
          <span>Overall Completion</span>
          <span id="overall-percentage">0 / 250 (0.0%)</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="overall-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <main class="container">
    <!-- Grid View Tab Content -->
    <div id="home-view">
      <div class="filter-panel" id="search-container">
        <div class="search-box-wrap">
          <i class="fa-solid fa-magnifying-glass search-box-icon"></i>
          <input type="text" id="search" class="search-box" placeholder="Filter films by title, director, actors, year..." />
        </div>
        <select id="sort-select" class="sort-dropdown" onchange="handleSort(this.value)">
          <option value="rank">IMDb Rating Rank (1-250)</option>
          <option value="rating">Highest Rating First</option>
          <option value="year-desc">Release Year (Newest)</option>
          <option value="year-asc">Release Year (Oldest)</option>
        </select>
      </div>

      <div class="grid" id="grid">
        <div class="loader-overlay" id="loading-spinner">
          <div class="spinner"></div>
          <span>Loading movies database...</span>
        </div>
      </div>
    </div>

    <!-- Achievements Tab Content -->
    <div id="badges-view" class="badges-view">
      <h2 style="font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 24px; text-align: center;">Your Achievements</h2>
      <div class="badges-grid" id="badge-list">
        <!-- Injected Dynamically -->
      </div>
    </div>
  </main>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <div class="nav-btn active" id="btn-home">
      <i class="fa-solid fa-grip"></i>
      <span>Home</span>
    </div>
    <div class="nav-btn" id="btn-badges">
      <i class="fa-solid fa-award"></i>
      <span>Badges (<span id="unlocked-count">0</span>/10)</span>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    // Storage Keys
    const WATCHED_KEY = "imdb_tracker_list_v2";
    const WATCHLIST_KEY = "imdb_watchlist_data";

    // Hardcoded TMDB API Key from user configuration
    const API_KEY = "4f09deb9e0cba637e35e8490ba35dd3f";

    // Load Custom Cached Posters from LocalStorage
    let apiPosters = {};
    try {
      const saved = localStorage.getItem('imdb_api_posters_v2');
      if (saved) apiPosters = JSON.parse(saved);
    } catch(e) {}

    // Application States
    let movies = [];
    let activeList = [];
    let watchedSet = new Set();
    let query = "";
    let sortBy = "rank";

    // Badges definitions
    const ACHIEVEMENTS = [
      { id: "b1", title: "Cinephile Novice", desc: "Watch at least 5 movies from the list.", icon: "fa-medal", type: "count", target: 5 },
      { id: "b2", title: "Cinema Buff", desc: "Watch at least 25 movies from the list.", icon: "fa-award", type: "count", target: 25 },
      { id: "b3", title: "Cinephile Elite", desc: "Watch at least 100 movies from the list.", icon: "fa-crown", type: "count", target: 100 },
      { id: "b4", title: "IMDb Master", desc: "Watch all 250 movies from the list.", icon: "fa-trophy", type: "count", target: 250 },
      { id: "nolan", title: "Nolan Disciple", desc: "Watch 5 Christopher Nolan films.", icon: "fa-brain", type: "director", director: "Christopher Nolan", target: 5 },
      { id: "godfather", title: "The Family", desc: "Watch both The Godfather and The Godfather Part II.", icon: "fa-handshake", type: "special_godfather", target: 2 },
      { id: "classics", title: "Vintage Explorer", desc: "Watch 10 movies released before 1970.", icon: "fa-hourglass-half", type: "year", yearLimit: 1970, target: 10 },
      { id: "modern", title: "Modern Masterpieces", desc: "Watch 15 movies released in 2010 or later.", icon: "fa-bolt", type: "year_modern", yearLimit: 2010, target: 15 },
      { id: "scifi", title: "Sci-Fi Explorer", desc: "Watch 8 Sci-Fi movies.", icon: "fa-user-astronaut", type: "genre", genre: "Sci-Fi", target: 8 },
      { id: "crime", title: "Crime Syndicate", desc: "Watch 8 Crime movies.", icon: "fa-user-secret", type: "genre", genre: "Crime", target: 8 }
    ];

    // DOM cache
    let grid, badgeList, searchInput, watchedCountEl, barEl, viewHome, viewBadges, searchContainer, btnHome, btnBadges;

    // Initialize application on DOM load
    window.addEventListener("DOMContentLoaded", () => {
      grid = document.getElementById("grid");
      badgeList = document.getElementById("badge-list");
      searchInput = document.getElementById("search");
      watchedCountEl = document.getElementById("watched-count") || {textContent: ''};
      barEl = document.getElementById("overall-fill");
      viewHome = document.getElementById("home-view");
      viewBadges = document.getElementById("badges-view");
      searchContainer = document.getElementById("search-container");
      btnHome = document.getElementById("btn-home");
      btnBadges = document.getElementById("btn-badges");

      init();
    });

    let cardObserver;
    const queue = [];
    let isFetching = false;

    function init() {
      loadLocalStorage();
      setupCardObserver();
      loadDatabase();
      setupListeners();
    }

    function loadLocalStorage() {
      const stored = localStorage.getItem(WATCHED_KEY);
      if (stored) {
        try {
          const list = JSON.parse(stored);
          watchedSet = new Set(list);
        } catch(e) {}
      }

      // Clear "failed" entries to re-fetch with improved fallback algorithm
      let changed = false;
      for (const title in apiPosters) {
        if (apiPosters[title] === "failed") {
          delete apiPosters[title];
          changed = true;
        }
      }
      if (changed) {
        localStorage.setItem('imdb_api_posters_v2', JSON.stringify(apiPosters));
      }
    }

    function saveLocalStorage() {
      localStorage.setItem(WATCHED_KEY, JSON.stringify(Array.from(watchedSet)));
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove("show"), 2500);
    }

    // Load static local database
    async function loadDatabase() {
      try {
        const response = await fetch('./movies-250.json');
        if (!response.ok) throw new Error("Failed to load local JSON file");
        const data = await response.json();
        
        movies = data;
        // Assign rank numbers and ID strings based on rating sort
        movies.forEach((m, idx) => {
          m.rank = idx + 1;
          m.id = `m${idx + 1}`;
          m.title = m.name; // map name to title for TMDB loop
          
          // Use cached TMDB poster, or load dynamically in viewport
          const cached = apiPosters[m.title];
          if (cached && cached !== "failed") {
            m.poster = cached;
          } else {
            m.poster = undefined;
          }
        });

        activeList = [...movies];
        
        // Sync with user's watchlist
        syncFromPersonalWatchlist();
        
        updateStats();
        filterAndSort();
        
        // Dynamically start fetching missing TMDB poster art in background
        initFetchQueue();
      } catch (err) {
        console.error("Error loading JSON database:", err);
        grid.innerHTML = `
          <div class="loader-overlay" style="color: var(--text-dim); text-align: center;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 32px; margin-bottom: 12px; color: var(--text-dark);"></i>
            <p style="font-weight: 600;">Failed to load movies-250.json</p>
            <p style="font-size: 13px; opacity: 0.8; margin-top: 5px;">Ensure the file is present in your server's root folder.</p>
          </div>
        `;
      }
    }

    // Setup input and click event listeners
    function setupListeners() {
      searchInput.addEventListener("input", e => {
        query = e.target.value.toLowerCase().trim();
        filterAndSort();
      });
      
      btnHome.addEventListener("click", () => switchTab('home'));
      btnBadges.addEventListener("click", () => switchTab('badges'));
    }

    // Determine if movie still needs a TMDB query
    function needsTmdbFetch(movie) {
      return apiPosters[movie.title] === undefined;
    }

    // Setup IntersectionObserver to prioritize viewport fetching
    function setupCardObserver() {
      if (!('IntersectionObserver' in window)) return;
      
      cardObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const card = entry.target;
            const movieId = card.dataset.id;
            const movie = movies.find(m => m.id === movieId);
            if (movie && needsTmdbFetch(movie)) {
              prioritizeMovie(movie);
            }
            cardObserver.unobserve(card);
          }
        });
      }, {
        root: null,
        rootMargin: "100px 0px 100px 0px", // prefetch 100px before coming on screen
        threshold: 0.01
      });
    }

    // Push movie to the front of TMDB fetch queue
    function prioritizeMovie(movie) {
      if (!needsTmdbFetch(movie)) return;
      
      const idx = queue.findIndex(m => m.id === movie.id);
      if (idx > -1) {
        queue.splice(idx, 1);
      }
      queue.unshift(movie);
      processQueue();
    }

    // Background fetch initialization
    function initFetchQueue() {
      movies.forEach(m => {
        if (needsTmdbFetch(m)) {
          queue.push(m);
        }
      });
      processQueue();
    }

    // Serialized fetch worker with rate limit delay
    async function processQueue() {
      if (isFetching) return;
      isFetching = true;
      
      while (queue.length > 0) {
        const movie = queue.shift();
        if (needsTmdbFetch(movie)) {
          await fetchMoviePoster(movie);
          await new Promise(r => setTimeout(r, 250)); // 250ms delay to prevent rate limit
        }
      }
      
      isFetching = false;
    }

    // Fetch poster for a movie from TMDB
    async function fetchMoviePoster(movie) {
      try {
        let url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(movie.title)}&primary_release_year=${movie.year}`;
        let res = await fetch(url);
        if (!res.ok) {
          console.error("TMDB API request failed with status", res.status);
          return; // Skip caching as failed if network error
        }
        let data = await res.json();
        if (data.success === false) {
          console.error("TMDB API returned error:", data.status_message);
          return; // Skip caching as failed if API key or authorization error
        }
        
        // Fallback: search without release year constraint if strict filtering returns no results
        if ((!data.results || data.results.length === 0) && movie.year) {
          url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(movie.title)}`;
          res = await fetch(url);
          if (!res.ok) {
            console.error("TMDB Fallback API request failed with status", res.status);
            return;
          }
          data = await res.json();
          if (data.success === false) {
            console.error("TMDB Fallback API returned error:", data.status_message);
            return;
          }
        }
        
        if (data.results && data.results.length > 0 && data.results[0].poster_path) {
          const posterUrl = `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
          movie.poster = posterUrl;
          apiPosters[movie.title] = posterUrl;
          localStorage.setItem('imdb_api_posters_v2', JSON.stringify(apiPosters));
          
          // Dynamically swap the image inside the card if visible on screen
          const card = document.querySelector(`.poster[data-id="${movie.id}"]`);
          if (card) {
            card.innerHTML = "";
            const img = document.createElement("img");
            img.alt = movie.title;
            img.setAttribute("loading", "lazy");
            img.style.opacity = 0;
            img.addEventListener("load", () => {
              img.style.opacity = 1;
            });
            img.addEventListener("error", () => {
              handleImageError(img, movie);
            });
            img.src = posterUrl;
            card.appendChild(img);

            // Add rank badge for visual check on image overlay
            const rankBadge = document.createElement("div");
            rankBadge.className = "rank-badge";
            rankBadge.textContent = movie.rank;
            card.appendChild(rankBadge);
          }
        } else {
          // If TMDB returns no results, store "failed" in cache to skip in future
          apiPosters[movie.title] = "failed";
          localStorage.setItem('imdb_api_posters_v2', JSON.stringify(apiPosters));
        }
      } catch(err) {
        console.error("Fetch error for", movie.title, err);
      }
    }

    // Toggle movie watched status
    function toggleWatched(id, cardElement) {
      const movie = movies.find(m => m.id === id);
      if (!movie) return;

      if (watchedSet.has(id)) {
        watchedSet.delete(id);
        updatePersonalWatchlist(movie, "want");
        if (cardElement) cardElement.classList.remove("watched");
        showToast(`Removed "${movie.name}" from watched list`);
      } else {
        watchedSet.add(id);
        updatePersonalWatchlist(movie, "watched");
        if (cardElement) cardElement.classList.add("watched");
        showToast(`Marked "${movie.name}" as watched`);
      }

      saveLocalStorage();
      updateStats();
    }

    // Sync from personal movie database (index.html)
    function syncFromPersonalWatchlist() {
      const stored = localStorage.getItem(WATCHLIST_KEY);
      if (!stored) return;
      try {
        const watchlist = JSON.parse(stored);
        const watchedTitles = new Set(
          watchlist
            .filter(m => m.status === "watched")
            .map(m => m.t.toLowerCase().trim())
        );

        let changed = false;
        movies.forEach(m => {
          const titleKeyNormalized = m.name.toLowerCase().trim();
          const isWatchedInWatchlist = watchedTitles.has(titleKeyNormalized);
          const isWatchedInTop250 = watchedSet.has(m.id);

          if (isWatchedInWatchlist && !isWatchedInTop250) {
            watchedSet.add(m.id);
            changed = true;
          } else if (!isWatchedInWatchlist && isWatchedInTop250) {
            watchedSet.delete(m.id);
            changed = true;
          }
        });

        if (changed) {
          saveLocalStorage();
        }
      } catch (e) {
        console.error("Failed to sync from personal watchlist:", e);
      }
    }

    // Update state in watchlist database
    function updatePersonalWatchlist(movie, status) {
      const stored = localStorage.getItem(WATCHLIST_KEY);
      let watchlist = [];
      if (stored) {
        try { watchlist = JSON.parse(stored); } catch(e) {}
      }

      const titleKey = movie.name.toLowerCase().trim();
      const existingIdx = watchlist.findIndex(m => m.t.toLowerCase().trim() === titleKey);

      if (existingIdx >= 0) {
        watchlist[existingIdx].status = status;
      } else if (status === "watched") {
        const posterUrl = movie.poster || "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=260&auto=format&fit=crop";

        watchlist.push({
          t: movie.name,
          g: movie.genre.join(", ") || "Drama",
          y: movie.year || 2010,
          r: movie.rating || 7.0,
          rt: 120,
          p: posterUrl,
          status: "watched"
        });
      }

      localStorage.setItem(WATCHLIST_KEY, JSON.stringify(watchlist));
    }

    function updateStats() {
      const count = watchedSet.size;
      if(watchedCountEl) watchedCountEl.textContent = count;
      
      const pct = ((count / 250) * 100).toFixed(1);
      document.getElementById("overall-percentage").textContent = `${count} / 250 (${pct}%)`;
      if(barEl) barEl.style.width = pct + "%";

      renderBadges();
      updateNavStats();
    }

    // Update unified stats pill in header
    function updateNavStats() {
      const count = watchedSet.size;
      const pct = ((count / 250) * 100).toFixed(0);

      // Count unlocked achievements
      let unlockedCount = 0;
      const watchedMovies = movies.filter(m => watchedSet.has(m.id));

      ACHIEVEMENTS.forEach(badge => {
        let current = 0;
        if (badge.type === "count") {
          current = watchedMovies.length;
        } else if (badge.type === "director") {
          current = watchedMovies.filter(m => m.directors && m.directors.some(d => d.toLowerCase().includes(badge.director.toLowerCase()))).length;
        } else if (badge.type === "genre") {
          current = watchedMovies.filter(m => m.genre && m.genre.some(g => g.toLowerCase().includes(badge.genre.toLowerCase()))).length;
        } else if (badge.type === "year") {
          current = watchedMovies.filter(m => m.year < badge.yearLimit).length;
        } else if (badge.type === "year_modern") {
          current = watchedMovies.filter(m => m.year >= badge.yearLimit).length;
        } else if (badge.type === "special_godfather") {
          current = watchedMovies.filter(m => m.name.includes("The Godfather")).length;
        }
        if (current >= badge.target) unlockedCount++;
      });

      const statsEl = document.getElementById("nav-stats-completed");
      if (statsEl) {
        statsEl.innerHTML = `<span><i class="fa-solid fa-star"></i> <strong>${count}</strong>/250 (${pct}%)</span><span>&nbsp;&bull;&nbsp;</span><span><i class="fa-solid fa-award"></i> <strong>${unlockedCount}</strong>/10 Badges</span>`;
      }
    }

    // Render Grid Posters
    function renderGrid() {
      renderMovies(activeList);
    }

    function renderMovies(list) {
      grid.innerHTML = "";

      if (list.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 50px 0; color: var(--text-dark);">
            <i class="fa-solid fa-magnifying-glass-minus" style="font-size: 24px; margin-bottom: 12px;"></i>
            <p>No films matching search filter.</p>
          </div>
        `;
        return;
      }

      list.forEach(movie => {
        const isWatched = watchedSet.has(movie.id);
        const card = document.createElement("div");
        card.className = "poster" + (isWatched ? " watched" : "");
        card.dataset.id = movie.id;
        card.setAttribute("title", `${movie.name} (${movie.year})`);

        if (movie.poster) {
          const img = document.createElement("img");
          img.alt = movie.title;
          img.setAttribute("loading", "lazy");
          img.style.opacity = 0;
          img.addEventListener("load", () => {
            img.style.opacity = 1;
          });
          img.addEventListener("error", () => {
            handleImageError(img, movie);
          });
          img.src = movie.poster;
          card.appendChild(img);

          // Add rank badge for visual check on image overlay
          const rankBadge = document.createElement("div");
          rankBadge.className = "rank-badge";
          rankBadge.textContent = movie.rank;
          card.appendChild(rankBadge);
        } else {
          const placeholder = document.createElement("div");
          placeholder.className = "placeholder";
          placeholder.innerHTML = `
            <div class="rank">${movie.rank}</div>
            <div class="title">${movie.name}</div>
          `;
          card.appendChild(placeholder);
        }

        card.onclick = () => toggleWatched(movie.id, card);
        grid.appendChild(card);

        if (cardObserver && needsTmdbFetch(movie)) {
          cardObserver.observe(card);
        }
      });
    }

    // Handles fallback when an image URL fails to load
    function handleImageError(imgElement, movie) {
      const card = imgElement.parentElement;
      if (card) {
        card.innerHTML = `
          <div class="placeholder">
            <div class="rank">${movie.rank}</div>
            <div class="title">${movie.name}</div>
          </div>
        `;
      }
      // If we haven't successfully fetched TMDB yet, prioritize it!
      if (needsTmdbFetch(movie)) {
        prioritizeMovie(movie);
      }
    }

    // Tabs toggle
    function switchTab(tabId) {
      viewHome.style.display = tabId === 'home' ? 'block' : 'none';
      searchContainer.style.display = tabId === 'home' ? 'block' : 'none';
      viewBadges.style.display = tabId === 'badges' ? 'block' : 'none';

      btnHome.classList.toggle('active', tabId === 'home');
      btnBadges.classList.toggle('active', tabId === 'badges');
    }

    // Render Badges
    function renderBadges() {
      badgeList.innerHTML = "";

      ACHIEVEMENTS.forEach(badge => {
        const card = document.createElement("div");
        card.className = "badge-card";
        card.id = `badge-card-${badge.id}`;

        card.innerHTML = `
          <div class="badge-icon">
            <i class="fa-solid ${badge.icon}"></i>
          </div>
          <div class="badge-info">
            <div class="badge-title">${badge.title}</div>
            <div class="badge-desc">${badge.desc}</div>
            <div class="badge-progress-track">
              <div class="badge-progress-fill" id="badge-fill-${badge.id}"></div>
            </div>
          </div>
        `;

        badgeList.appendChild(card);
      });

      calculateBadgesProgress();
    }

    function calculateBadgesProgress() {
      let unlockedCount = 0;
      const watchedMovies = movies.filter(m => watchedSet.has(m.id));

      ACHIEVEMENTS.forEach(badge => {
        let current = 0;
        if (badge.type === "count") {
          current = watchedMovies.length;
        } else if (badge.type === "director") {
          current = watchedMovies.filter(m => m.directors && m.directors.some(d => d.toLowerCase().includes(badge.director.toLowerCase()))).length;
        } else if (badge.type === "genre") {
          current = watchedMovies.filter(m => m.genre && m.genre.some(g => g.toLowerCase().includes(badge.genre.toLowerCase()))).length;
        } else if (badge.type === "year") {
          current = watchedMovies.filter(m => m.year < badge.yearLimit).length;
        } else if (badge.type === "year_modern") {
          current = watchedMovies.filter(m => m.year >= badge.yearLimit).length;
        } else if (badge.type === "special_godfather") {
          current = watchedMovies.filter(m => m.name.includes("The Godfather")).length;
        }

        const pct = Math.min(100, (current / badge.target) * 100);
        const fillEl = document.getElementById(`badge-fill-${badge.id}`);
        const cardEl = document.getElementById(`badge-card-${badge.id}`);

        if (fillEl) fillEl.style.width = pct + "%";

        if (current >= badge.target) {
          if (cardEl) cardEl.classList.add("unlocked");
          unlockedCount++;
        } else {
          if (cardEl) cardEl.classList.remove("unlocked");
        }
      });

      document.getElementById("unlocked-count").textContent = unlockedCount;
    }

    // Filter and Sort actions
    function handleSort(val) {
      sortBy = val;
      filterAndSort();
    }

    function filterAndSort() {
      activeList = movies.filter(m => {
        return !query || 
          m.name.toLowerCase().includes(query) ||
          (m.directors && m.directors.some(d => d.toLowerCase().includes(query))) ||
          (m.actors && m.actors.some(a => a.toLowerCase().includes(query))) ||
          (m.genre && m.genre.some(g => g.toLowerCase().includes(query))) ||
          m.year.toString().includes(query);
      });

      if (sortBy === 'rank') {
        activeList.sort((a,b) => a.rank - b.rank);
      } else if (sortBy === 'rating') {
        activeList.sort((a,b) => b.rating - a.rating || a.rank - b.rank);
      } else if (sortBy === 'year-desc') {
        activeList.sort((a,b) => b.year - a.year || a.rank - b.rank);
      } else if (sortBy === 'year-asc') {
        activeList.sort((a,b) => a.year - b.year || a.rank - b.rank);
      }

      renderMovies(activeList);
    }

    // Cross-tab sync event
    window.addEventListener("storage", (e) => {
      if (e.key === WATCHLIST_KEY || e.key === WATCHED_KEY) {
        loadLocalStorage();
        if (movies.length > 0) {
          syncFromPersonalWatchlist();
          updateStats();
          filterAndSort();
          calculateBadgesProgress();
        }
      }
    });
  </script>
</body>
